<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEPT 中級寫作模擬平台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gept: {
                            light: '#FFF7ED',
                            base: '#FFEDD5',
                            primary: '#F97316',
                            dark: '#C2410C',
                            text: '#431407'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #FFF7ED; color: #431407; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1rem; transition: all 0.2s ease; }
        .day-header { font-weight: bold; color: #C2410C; text-align: center; padding: 4px; font-size: 1.1rem; }
        .day-empty { background-color: transparent; }
        .day-normal { background-color: #FFEDD5; color: #431407; }
        
        /* 完成的日期樣式：加入互動性與點擊游標 */
        .day-completed { background-color: #F97316; color: white; font-weight: bold; position: relative; box-shadow: 0 3px 6px rgba(249, 115, 22, 0.3); cursor: pointer; }
        .day-completed:hover { background-color: #EA580C; transform: translateY(-2px); box-shadow: 0 5px 10px rgba(249, 115, 22, 0.4); }
        .day-completed::after { content: '★'; position: absolute; top: 3px; right: 4px; font-size: 0.75rem; color: #FEF08A; }
        
        .loader { border: 4px solid #FFEDD5; border-top: 4px solid #F97316; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #FFEDD5; border-radius: 5px; }
        ::-webkit-scrollbar-thumb { background: #FDBA74; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #F97316; }

        /* 防止英文字過長不換行導致跑版 */
        .break-words { word-break: break-word; overflow-wrap: break-word; }

        /* --- Markdown 報告專用渲染樣式 (為大螢幕閱讀加強) --- */
        .markdown-body { color: #431407; line-height: 1.8; font-size: 1.1rem; }
        @media (min-width: 768px) { .markdown-body { font-size: 1.2rem; } }
        .markdown-body h1 { font-size: 1.75rem; font-weight: bold; color: #C2410C; margin: 2rem 0 1rem; border-bottom: 2px solid #FFEDD5; padding-bottom: 0.5rem; }
        .markdown-body h1:first-child { margin-top: 0; }
        .markdown-body h2 { font-size: 1.5rem; font-weight: bold; color: #9A3412; margin: 1.75rem 0 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .markdown-body h3 { font-size: 1.3rem; font-weight: bold; color: #F97316; margin: 1.5rem 0 0.5rem; }
        .markdown-body h4 { font-size: 1.15rem; font-weight: bold; color: #431407; margin: 1.25rem 0 0.5rem; background-color: #FFEDD5; padding: 0.35rem 0.85rem; border-radius: 0.5rem; display: inline-block; }
        .markdown-body p { margin-bottom: 1.2rem; }
        .markdown-body ul { list-style-type: none; padding-left: 0.5rem; margin-bottom: 1.2rem; }
        .markdown-body li { margin-bottom: 0.75rem; }
        .markdown-body strong { font-weight: 700; color: #b91c1c; } /* 凸顯錯誤或重點 */
        .markdown-body blockquote { border-left: 5px solid #F97316; background-color: #FFF7ED; padding: 1.5rem; margin: 1.5rem 0; border-radius: 0 0.5rem 0.5rem 0; font-style: italic; color: #78350F; font-size: 1.35rem; line-height: 1.9; }
        .markdown-body blockquote p:last-child { margin-bottom: 0; }
        /* Table Styles */
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; background-color: white; border-radius: 0.75rem; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .markdown-body th, .markdown-body td { border: 1px solid #FED7AA; padding: 1rem 1.25rem; text-align: left; }
        .markdown-body th { background-color: #FFEDD5; font-weight: bold; color: #9A3412; white-space: nowrap; font-size: 1.1rem; }
        .markdown-body tr:nth-child(even) { background-color: #FFF7ED; }
        .markdown-body hr { border: 0; border-top: 2px dashed #FDBA74; margin: 2.5rem 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <script type="module">
        // --- Custom Toast Notification System ---
        window.showToast = (message, type = 'info') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColors = {
                'error': 'bg-red-600',
                'success': 'bg-green-600',
                'info': 'bg-gray-800'
            };
            
            let icon = 'fa-info-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            if (type === 'success') icon = 'fa-check-circle';

            toast.className = `${bgColors[type] || bgColors['info']} text-white px-6 py-4 rounded-xl shadow-2xl transform transition-all duration-300 translate-y-12 opacity-0 flex items-start gap-4 max-w-[90vw] sm:max-w-lg pointer-events-auto border border-white/20`;
            toast.innerHTML = `<i class="fas ${icon} mt-1.5 text-xl shrink-0"></i><div class="text-base font-medium leading-relaxed break-words whitespace-pre-wrap">${message}</div>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-12', 'opacity-0');
            });
            
            const duration = type === 'error' ? 5000 : 3000;
            setTimeout(() => {
                toast.classList.add('translate-y-12', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        };

        // --- 2. Firebase Setup & Global State ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCan2_Rc26HsLkOPr0i5QrgdjAYyqcigJ0",
            authDomain: "english-reading-6b506.firebaseapp.com",
            projectId: "english-reading-6b506",
            storageBucket: "english-reading-6b506.firebasestorage.app",
            messagingSenderId: "494747176273",
            appId: "1:494747176273:web:585487fadb29b2e5e2d770"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gept-writing-mock-v1'; 
        const apiKey = ""; 

        // 升級後的資料表結構設定
        const COL_QUESTIONS = 'GEPT-Questions';
        const COL_USERS = 'GEPT-Users';              // 存放輕量級索引與日曆打卡
        const COL_SUBMISSIONS = 'GEPT-Submissions';  // 存放沉重的草稿與批改報告
        const DOC_GLOBAL = 'global';

        let app, db, auth;
        let currentUserUid = null;
        let currentUserName = null;
        let isFirebaseReady = false;
        
        // 變更：改為從資料庫動態載入，不再硬編碼
        let questionsData = []; 
        let userProfileData = { historyIndex: {}, completedDates: [] };
        let unsubscribeUser = null;
        
        let currentCalendarDate = new Date();

        // State Management
        window.appState = {
            currentView: 'login',
            selectedQuestionId: null,
            showView: async function(viewId) {
                if(viewId === 'dashboard' && !currentUserName) {
                    showToast("請先登入才能訪問此頁面", "error"); 
                    return;
                }
                document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
                document.getElementById(`${viewId}-view`).classList.remove('hidden');
                this.currentView = viewId;
                
                if (viewId === 'dashboard') {
                    renderDashboard();
                    window.scrollTo(0, 0);
                }
                if (viewId === 'test') {
                    await renderTestArea(); // 因為要讀取雲端草稿，改為 async
                }
            }
        };

        // --- API Key Modal Logic ---
        window.openApiModal = () => {
            const storedKey = localStorage.getItem('gemini_api_key');
            if(storedKey) document.getElementById('api-key-input').value = storedKey;
            document.getElementById('api-key-modal').classList.remove('hidden');
        };
        window.closeApiModal = () => document.getElementById('api-key-modal').classList.add('hidden');
        window.saveApiKey = () => {
            const key = document.getElementById('api-key-input').value.trim();
            if(key) {
                localStorage.setItem('gemini_api_key', key);
                closeApiModal();
                showToast('✅ API 金鑰已安全儲存！', 'success');
            } else {
                showToast('請輸入有效的金鑰', 'error');
            }
        };

        function updateConnectionStatus(status, text) {
            const light = document.getElementById('status-light');
            const txt = document.getElementById('status-text');
            txt.textContent = text;
            light.className = 'w-3 h-3 rounded-full shrink-0 ' + 
                (status === 'loading' ? 'bg-yellow-400 animate-pulse' : 
                 status === 'success' ? 'bg-green-500' : 'bg-red-500');
        }

        async function initFirebase() {
            try {
                updateConnectionStatus('loading', '連線至資料庫...');
                const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
                app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (authError) {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        currentUserUid = user.uid;
                        isFirebaseReady = true;
                        
                        // 1. 下載全域用戶清單
                        listenToGlobalUsers();
                        
                        // 2. 自動從雲端載入所有題庫
                        await loadQuestionsFromCloud();
                        
                        updateConnectionStatus('success', '系統就緒');
                    } else {
                        isFirebaseReady = false;
                    }
                });
            } catch (error) {
                console.error("Firebase Init Error:", error);
                updateConnectionStatus('error', '連線失敗');
                showToast('無法連線至資料庫', 'error');
            }
        }

        // --- 升級：從雲端動態拉取題庫 ---
        async function loadQuestionsFromCloud() {
            try {
                const qRef = collection(db, 'artifacts', appId, 'public', 'data', COL_QUESTIONS);
                const qSnap = await getDocs(qRef);
                questionsData = [];
                
                qSnap.forEach(doc => {
                    questionsData.push({ id: doc.id, ...doc.data() });
                });
                
                // 確保按照題目順序 (q1, q2, q3...) 排序
                questionsData.sort((a, b) => {
                    const numA = parseInt(a.id.replace('q', '')) || 0;
                    const numB = parseInt(b.id.replace('q', '')) || 0;
                    return numA - numB;
                });
                
                document.getElementById('total-q-count').textContent = questionsData.length;
                
                // 如果已經在 Dashboard 頁面，刷新列表
                if (appState.currentView === 'dashboard') {
                    renderDashboard();
                }
            } catch (error) {
                console.error("Failed to load questions:", error);
                showToast("載入題庫失敗，請重新整理頁面。", "error");
            }
        }

        function listenToGlobalUsers() {
            if(!currentUserUid || !isFirebaseReady) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', 'GEPT-Writing', DOC_GLOBAL);
            
            onSnapshot(globalRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.users && Array.isArray(data.users)) {
                        const names = data.users.map(u => typeof u === 'string' ? u : u.name).filter(Boolean);
                        const uniqueNames = [...new Set(names)].reverse();
                        renderQuickLogin(uniqueNames);
                    } else {
                        renderQuickLogin([]);
                    }
                } else {
                    renderQuickLogin([]);
                }
            }, (error) => {
                console.error("Listen global error:", error);
                updateConnectionStatus('error', '同步名單失敗');
            });
        }

        window.handleLogin = async (nameOverride) => {
            const nameInput = document.getElementById('login-name').value;
            const finalName = (nameOverride || nameInput).trim();
            if (!finalName) return showToast("請輸入您的姓名", "error");
            if (!isFirebaseReady) return showToast("系統連線中，請稍候...", "info");

            const loginBtn = document.querySelector('button[onclick="handleLogin()"]');
            const originalText = loginBtn.innerText;
            loginBtn.innerText = '登入中...';
            loginBtn.disabled = true;

            try {
                const globalRef = doc(db, 'artifacts', appId, 'public', 'data', 'GEPT-Writing', DOC_GLOBAL);
                const globalSnap = await getDoc(globalRef);
                let users = globalSnap.exists() ? globalSnap.data().users || [] : [];
                
                const stringUsers = users.map(u => typeof u === 'string' ? u : u.name).filter(Boolean);
                if (!stringUsers.includes(finalName)) {
                    stringUsers.push(finalName);
                    await setDoc(globalRef, { users: stringUsers }, { merge: true });
                }

                currentUserName = finalName;
                document.getElementById('header-user').classList.remove('hidden');
                document.getElementById('header-user').classList.add('flex');
                document.getElementById('header-username').textContent = finalName;
                document.getElementById('dashboard-username').textContent = finalName;

                subscribeToUserData(finalName);
                appState.showView('dashboard');
                showToast(`歡迎回來，${finalName}！`, 'success');
            } catch (e) {
                console.error("Login Error:", e);
                showToast("登入失敗，請檢查網路連線後重試。", "error");
            } finally {
                loginBtn.innerText = originalText;
                loginBtn.disabled = false;
            }
        };

        function subscribeToUserData(userName) {
            if (unsubscribeUser) unsubscribeUser();
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', COL_USERS, `user_${userName}`);
            
            unsubscribeUser = onSnapshot(userRef, async (docSnap) => {
                if (docSnap.exists()) {
                    userProfileData = docSnap.data();
                    if(!userProfileData.completedDates) userProfileData.completedDates = [];
                    if(!userProfileData.historyIndex) userProfileData.historyIndex = {};
                } else {
                    // 若新資料表沒有紀錄，檢查是否為舊版使用者並執行無痛轉移 (Auto-Migration)
                    const oldRef = doc(db, 'artifacts', appId, 'public', 'data', 'GEPT-Writing', `user_${userName}`);
                    const oldSnap = await getDoc(oldRef);
                    if (oldSnap.exists() && oldSnap.data().history) {
                        showToast("系統正在為您升級至無限容量資料庫，請稍候...", "info");
                        const oldData = oldSnap.data();
                        let newIndex = {};
                        // 轉換並推播到 Submissions
                        for (const qId of Object.keys(oldData.history)) {
                            const hw = oldData.history[qId];
                            const dateStr = hw.date || '2023-01-01'; // 舊版沒存日期的備案
                            newIndex[qId] = { lastUpdate: hw.lastUpdate, date: dateStr, hasFeedback: !!hw.feedback };
                            
                            // 將超大包檔案搬移到新家
                            const subRef = doc(db, 'artifacts', appId, 'public', 'data', COL_SUBMISSIONS, `${userName}_${qId}`);
                            await setDoc(subRef, { draft: hw.draft, feedback: hw.feedback, date: dateStr, lastUpdate: hw.lastUpdate }, { merge: true });
                        }
                        userProfileData = { historyIndex: newIndex, completedDates: oldData.completedDates || [] };
                        await setDoc(userRef, userProfileData);
                        showToast("升級完成！您的紀錄已安全轉移。", "success");
                    } else {
                        // 全新使用者
                        userProfileData = { historyIndex: {}, completedDates: [] };
                        await setDoc(userRef, userProfileData);
                    }
                }
                
                if(appState.currentView === 'dashboard') renderCalendar();
            }, (err) => console.error("User data listen error", err));
        }

        window.logout = () => {
            currentUserName = null;
            userProfileData = { historyIndex: {}, completedDates: [] };
            if(unsubscribeUser) unsubscribeUser();
            document.getElementById('header-user').classList.add('hidden');
            document.getElementById('header-user').classList.remove('flex');
            document.getElementById('login-name').value = '';
            appState.showView('login');
            showToast("已登出", "info");
        };

        function renderQuickLogin(users) {
            const container = document.getElementById('quick-login-list');
            if (users.length === 0) {
                container.innerHTML = '<span class="text-base text-gray-400">尚無紀錄</span>';
                return;
            }
            container.innerHTML = users.map(u => `
                <button onclick="handleLogin('${u}')" class="bg-orange-100 text-gept-dark px-4 py-2 rounded-full text-base font-bold hover:bg-orange-200 transition border border-orange-200 shadow-sm flex items-center gap-2 max-w-full truncate">
                    <i class="fas fa-user text-sm shrink-0"></i> <span class="truncate">${u}</span>
                </button>
            `).join('');
        }

        function renderDashboard() {
            renderCalendar();
            const qList = document.getElementById('question-list');
            
            if (questionsData.length === 0) {
                qList.innerHTML = '<div class="text-center text-gray-500 py-10"><i class="fas fa-spinner fa-spin text-2xl mb-3"></i><br>正在從雲端載入題庫...</div>';
                return;
            }

            qList.innerHTML = questionsData.map((q, index) => {
                // 改由檢查輕量級的 historyIndex 判斷是否完成
                const savedIndex = userProfileData.historyIndex?.[q.id];
                const hasCompleted = savedIndex && savedIndex.hasFeedback;
                const statusIcon = hasCompleted 
                    ? `<i class="fas fa-check-circle text-green-500 text-2xl" title="已完成"></i>` 
                    : `<i class="far fa-circle text-gray-300 text-2xl" title="未完成"></i>`;
                
                return `
                <div class="flex items-center justify-between p-4 sm:p-5 bg-orange-50 rounded-2xl border border-orange-100 hover:shadow-md hover:border-orange-300 transition-all cursor-pointer gap-3 sm:gap-4 group" onclick="selectQuestion('${q.id}')">
                    <div class="flex items-start gap-3 sm:gap-4 flex-1 min-w-0">
                        <div class="mt-1 shrink-0 transition-transform group-hover:scale-110">${statusIcon}</div>
                        <div class="flex-1 min-w-0">
                            <div class="font-bold text-gept-text text-lg sm:text-xl break-words leading-snug mb-1">${index + 1}. ${q.title}</div>
                            <div class="text-sm text-orange-600 bg-orange-200 inline-block px-3 py-1 rounded font-medium">${q.type}</div>
                        </div>
                    </div>
                    <button class="bg-white border-2 border-gept-primary text-gept-primary group-hover:bg-gept-primary group-hover:text-white w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center transition-colors shadow-sm shrink-0">
                        <i class="fas fa-pen text-base sm:text-lg"></i>
                    </button>
                </div>
                `;
            }).join('');
        }

        window.changeMonth = (delta) => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + delta);
            renderCalendar();
        };

        function renderCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            document.getElementById('calendar-month-year').textContent = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const calendarBody = document.getElementById('calendar-body');
            let html = '';
            
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="calendar-day day-empty"></div>`;
            }
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isCompleted = userProfileData.completedDates && userProfileData.completedDates.includes(dateString);
                
                if(isCompleted) {
                    html += `<div class="calendar-day day-completed" onclick="openHistoryModal('${dateString}')" title="點擊查看當日紀錄">${i}</div>`;
                } else {
                    html += `<div class="calendar-day day-normal">${i}</div>`;
                }
            }
            
            calendarBody.innerHTML = html;
        }

        window.openHistoryModal = (dateStr) => {
            // 從輕量索引中找出該日期的題目
            const matches = Object.keys(userProfileData.historyIndex || {}).filter(qId => {
                const idx = userProfileData.historyIndex[qId];
                return idx.date === dateStr && idx.hasFeedback;
            });

            const content = document.getElementById('history-modal-content');
            document.getElementById('history-modal-title').innerHTML = `<i class="far fa-calendar-check text-gept-primary"></i> ${dateStr} 練習紀錄`;

            if(matches.length === 0) {
                content.innerHTML = '<div class="text-center text-gray-500 text-lg py-10">此日期沒有完整的批改紀錄。</div>';
            } else if(matches.length === 1) {
                showHistoryFeedback(matches[0]);
            } else {
                let listHtml = '<div class="space-y-4">';
                listHtml += '<p class="text-lg text-gray-600 mb-4">您在這天完成了多項練習，請選擇要查看的項目：</p>';
                matches.forEach(qId => {
                    const q = questionsData.find(x => x.id === qId);
                    const title = q ? q.title : `未知題目 (${qId})`;
                    listHtml += `
                        <button onclick="showHistoryFeedback('${qId}')" class="w-full text-left p-6 border-2 border-orange-100 rounded-2xl hover:bg-orange-50 hover:border-orange-300 transition-all group flex justify-between items-center shadow-sm">
                            <span class="font-bold text-xl text-gept-dark group-hover:text-gept-primary transition-colors">${title}</span>
                            <i class="fas fa-chevron-right text-gray-400 group-hover:text-gept-primary"></i>
                        </button>
                    `;
                });
                listHtml += '</div>';
                content.innerHTML = listHtml;
            }

            document.getElementById('history-modal').classList.remove('hidden');
        };

        // --- 升級：觀看紀錄時，動態向資料庫調閱龐大的報告內容 ---
        window.showHistoryFeedback = async (qId) => {
            const content = document.getElementById('history-modal-content');
            const q = questionsData.find(x => x.id === qId);
            const title = q ? q.title : '練習紀錄';
            
            document.getElementById('history-modal-title').innerHTML = `<i class="fas fa-file-alt text-gept-primary"></i> ${title} - 詳細解析`;
            content.innerHTML = '<div class="text-center py-20"><div class="loader mx-auto mb-4"></div><p class="text-gray-500 text-lg">正在從雲端載入解析報告...</p></div>';

            try {
                const subRef = doc(db, 'artifacts', appId, 'public', 'data', COL_SUBMISSIONS, `${currentUserName}_${qId}`);
                const subSnap = await getDoc(subRef);
                
                if (!subSnap.exists()) {
                    content.innerHTML = '<div class="text-center text-red-500 py-10 text-xl font-bold">找不到此紀錄的詳細資料，可能已被移除。</div>';
                    return;
                }

                const data = subSnap.data();
                let html = `
                    <div class="mb-8 p-6 md:p-8 bg-orange-50 rounded-2xl border-2 border-orange-100 shadow-inner">
                        <h4 class="font-bold text-gept-dark mb-4 border-b-2 border-orange-200 pb-2 text-xl md:text-2xl"><i class="fas fa-pen-fancy mr-2"></i>您的原創作文</h4>
                        <p class="whitespace-pre-wrap text-gray-800 leading-loose text-xl sm:text-2xl font-medium">${data.draft}</p>
                    </div>
                    <div class="flex items-center gap-4 my-8">
                        <div class="flex-grow h-px bg-orange-200"></div>
                        <span class="text-orange-400 text-lg font-bold">AI 老師解析</span>
                        <div class="flex-grow h-px bg-orange-200"></div>
                    </div>
                    <div class="markdown-body bg-white p-2">
                        ${marked.parse(data.feedback)}
                    </div>
                    <div class="mt-8 text-center">
                       <button onclick="closeHistoryModal()" class="px-8 py-3 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-xl font-bold text-lg transition-colors shadow-sm">關閉視窗</button>
                    </div>
                `;
                content.innerHTML = html;
            } catch (error) {
                content.innerHTML = `<div class="text-center text-red-500 py-10 text-xl font-bold">讀取失敗：${error.message}</div>`;
            }
        };

        window.closeHistoryModal = () => {
            document.getElementById('history-modal').classList.add('hidden');
        };

        window.selectQuestion = (qId) => {
            appState.selectedQuestionId = qId;
            appState.showView('test');
        };

        // --- 升級：進入作答區時，若有草稿，動態從 Submissions 拉取 ---
        async function renderTestArea() {
            const q = questionsData.find(x => x.id === appState.selectedQuestionId);
            if(!q) return;

            document.getElementById('q-title').textContent = q.title;
            document.getElementById('q-type').textContent = q.type;
            document.getElementById('q-instructions').textContent = q.instructions;
            document.getElementById('q-prompt').textContent = q.prompt;
            document.getElementById('q-sample').textContent = q.sample;
            
            document.getElementById('q-sample').classList.add('hidden');
            document.getElementById('sample-text').textContent = '顯示範例文章';
            document.getElementById('sample-icon').className = 'fas fa-chevron-down';
            
            const textarea = document.getElementById('user-answer');
            const savedIndex = userProfileData.historyIndex?.[q.id];
            
            // 讓使用者知道正在載入草稿
            textarea.disabled = true;
            textarea.value = '正在從雲端同步草稿...';
            document.getElementById('last-saved').textContent = '';
            
            if (savedIndex) {
                try {
                    const subRef = doc(db, 'artifacts', appId, 'public', 'data', COL_SUBMISSIONS, `${currentUserName}_${q.id}`);
                    const subSnap = await getDoc(subRef);
                    if(subSnap.exists() && subSnap.data().draft) {
                        textarea.value = subSnap.data().draft;
                    } else {
                        textarea.value = '';
                    }
                    document.getElementById('last-saved').textContent = `上次作答時間: ${savedIndex.lastUpdate}`;
                } catch(e) {
                    textarea.value = '';
                    console.error("載入草稿失敗", e);
                }
            } else {
                textarea.value = '';
            }
            
            textarea.disabled = false;
            updateWordCount();
            window.scrollTo(0, 0);
        }

        window.toggleSample = () => {
            const sampleDiv = document.getElementById('q-sample');
            const isHidden = sampleDiv.classList.contains('hidden');
            if (isHidden) {
                sampleDiv.classList.remove('hidden');
                document.getElementById('sample-text').textContent = '隱藏範例文章';
                document.getElementById('sample-icon').className = 'fas fa-chevron-up';
            } else {
                sampleDiv.classList.add('hidden');
                document.getElementById('sample-text').textContent = '顯示範例文章';
                document.getElementById('sample-icon').className = 'fas fa-chevron-down';
            }
        };

        document.getElementById('user-answer').addEventListener('input', updateWordCount);
        function updateWordCount() {
            const text = document.getElementById('user-answer').value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            document.getElementById('word-count').textContent = `字數: ${words}`;
        }

        window.submitAnswer = async () => {
            const answer = document.getElementById('user-answer').value.trim();
            if (answer.split(/\s+/).length < 20) {
                showToast("作答內容太少，請至少輸入 20 個字以上再提交批改！", "error");
                return;
            }

            const q = questionsData.find(x => x.id === appState.selectedQuestionId);
            document.getElementById('ai-loading').classList.remove('hidden');
            document.getElementById('ai-loading-text').textContent = '正在儲存草稿...';
            
            try {
                // 先只保存草稿
                await saveProgress(answer, null);
                
                document.getElementById('ai-loading-text').textContent = 'AI 老師正在認真批改中...';
                const feedbackData = await callGeminiAPI(q.prompt, answer);
                renderFeedback(feedbackData);
                
                document.getElementById('ai-loading-text').textContent = '正在儲存報告至雲端...';
                // 批改完成後完整保存(包含 draft 與 feedback)
                await saveProgress(answer, feedbackData);
                
                appState.showView('feedback');
                window.scrollTo(0, 0);
                showToast("批改完成！紀錄已自動保存至雲端。", "success");

            } catch (e) {
                console.error("Submit Error:", e);
                if(e.message.includes("400")) {
                    showToast("批改失敗 (Error 400)\n您的舊金鑰可能已被 Google 停用。\n請至設定中輸入新金鑰。", "error");
                    setTimeout(openApiModal, 1500);
                } else if(e.message.includes("403")) {
                    showToast("批改失敗 (Error 403)\n缺少有效金鑰或權限不足。\n請設定您的專屬 API 金鑰！", "error");
                    setTimeout(openApiModal, 1500);
                } else if(e.message.includes("429")) {
                    showToast("批改失敗 (Error 429)\n請求太頻繁或免費額度已滿，請稍後再試。", "error");
                } else if(e.message.includes("404")) {
                    showToast("批改失敗 (Error 404)\n找不到 AI 模型，請聯絡開發人員。", "error");
                } else {
                    showToast("批改過程中發生錯誤，請稍後再試。\n" + e.message, "error");
                }
            } finally {
                document.getElementById('ai-loading').classList.add('hidden');
            }
        };

        // --- 升級：雙軌儲存架構 ---
        async function saveProgress(draft, feedback) {
            if(!currentUserName) return;
            
            const qId = appState.selectedQuestionId;
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const timeStr = now.toLocaleString('zh-TW');

            // 1. 存放大包袱 (Heavy Data) 到獨立的 Submissions 檔案，避開 1MB 限制
            const subRef = doc(db, 'artifacts', appId, 'public', 'data', COL_SUBMISSIONS, `${currentUserName}_${qId}`);
            await setDoc(subRef, {
                draft: draft,
                feedback: feedback || null,
                date: dateStr,
                lastUpdate: timeStr
            }, { merge: true });

            // 2. 存放輕量索引 (Lightweight Index) 到 User 檔案，供日曆與列表快速渲染
            let newIndex = { ...userProfileData.historyIndex };
            newIndex[qId] = {
                lastUpdate: timeStr,
                date: dateStr,
                hasFeedback: !!feedback || (newIndex[qId] ? newIndex[qId].hasFeedback : false)
            };

            let newDates = [...(userProfileData.completedDates || [])];
            if (feedback && !newDates.includes(dateStr)) {
                newDates.push(dateStr);
            }

            const userRef = doc(db, 'artifacts', appId, 'public', 'data', COL_USERS, `user_${currentUserName}`);
            await setDoc(userRef, {
                historyIndex: newIndex,
                completedDates: newDates
            }, { merge: true });
        }

        async function callGeminiAPI(questionPrompt, userAnswer) {
            const systemPrompt = `你是一位專業、親切且充滿熱忱的英文寫作老師。你的目標是幫助學生找出英文作文中的盲點，並提供最詳細、易懂、且視覺排版豐富的解析報告。

請務必使用「繁體中文」進行解說，並嚴格遵循以下的 Markdown 輸出格式與架構，不可遺漏任何一個單元。為了確保在各種 App 介面上的相容性，請不要使用 HTML 標籤，請完全依賴 Markdown 與 Emoji 來做視覺區分。

### 輸出格式規定：

Hello! 我是你的專屬英文老師 👩‍🏫。針對你這次的寫作，我做了非常詳細的分析。接下來，我們一起來看看如何讓這篇文章變得更完美吧！✨

(從學生的錯誤中，挑選 2-3 個核心文法觀念進行特訓，嚴格使用以下格式)：

## 🔠 5. 錯誤單字大彙整 (Vocabulary Booster!)
(挑選學生用錯或可以用得更好的單字，製作成 Markdown 表格，表格需包含以下欄位：)

| :--- | :--- | :--- | :--- |
| (單字) | (詞性) | (學生原句節錄) | (解釋與正確例句) |`;

            const userMessage = `題目提示：\n${questionPrompt}\n\n學生作答：\n${userAnswer}`;

            const activeKey = localStorage.getItem('gemini_api_key') || apiKey;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: userMessage }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    temperature: 0.3
                }
            };

            let retries = 5;
            let delay = 1000;
            
            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`API HTTP Error: ${response.status}`);
                    
                    const result = await response.json();
                    let textResult = result.candidates[0].content.parts[0].text;
                    return textResult;

                } catch (e) {
                    retries--;
                    if (retries === 0) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

                return;
            }

            contentContainer.innerHTML = marked.parse(markdownData);
        }
