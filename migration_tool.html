<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEPT 題庫後台管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen p-6 font-sans text-gray-800">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <!-- 上方：上傳控制區 -->
        <div class="bg-white p-8 rounded-2xl shadow-md text-center border-t-4 border-orange-500">
            <h1 class="text-3xl font-bold text-gept-dark mb-2"><i class="fas fa-database text-orange-500 mr-3"></i>GEPT 題庫後台管理系統</h1>
            <p class="text-gray-600 mb-6 text-base">此工具用於將本地端 <code class="bg-gray-100 px-2 py-1 rounded text-red-500 font-mono text-sm">questionsData</code> 中的最新題目，上傳或更新至 Firebase 雲端資料庫。</p>
            
            <button id="migrate-btn" onclick="startMigration()" class="bg-orange-500 text-white font-bold text-lg px-8 py-3 rounded-xl hover:bg-orange-600 shadow-md transition-all transform hover:-translate-y-0.5 inline-flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt"></i> 同步/上傳最新題庫至雲端
            </button>

            <div id="log-area" class="mt-6 text-left bg-gray-900 text-green-400 p-4 rounded-xl h-32 overflow-y-auto font-mono text-sm hidden">
                <!-- Logs will appear here -->
            </div>
        </div>

        <!-- 下方：雲端資料檢視區 -->
        <div class="bg-white p-8 rounded-2xl shadow-md">
            <div class="flex justify-between items-center mb-6 border-b border-gray-200 pb-4">
                <h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-cloud text-blue-500 mr-2"></i>目前雲端資料庫題庫狀態</h2>
                <button onclick="fetchCloudQuestions()" class="text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 px-4 py-2 rounded-lg transition-colors font-medium">
                    <i class="fas fa-sync-alt mr-1"></i> 重新整理列表
                </button>
            </div>

            <div id="cloud-loading" class="text-center py-10 text-gray-500">
                <i class="fas fa-spinner fa-spin text-3xl mb-3 text-blue-400"></i>
                <p>正在從 Firebase 撈取資料...</p>
            </div>

            <div class="overflow-x-auto hidden" id="table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 border-b-2 border-gray-200">
                            <th class="p-4 font-bold w-20">題號 ID</th>
                            <th class="p-4 font-bold w-32">題型</th>
                            <th class="p-4 font-bold">題目名稱 (Title)</th>
                            <th class="p-4 font-bold text-center w-24">狀態</th>
                        </tr>
                    </thead>
                    <tbody id="cloud-questions-list" class="divide-y divide-gray-100">
                        <!-- 動態插入 -->
                    </tbody>
                </table>
            </div>
            <div id="cloud-empty" class="hidden text-center py-10 text-gray-500 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                <i class="fas fa-box-open text-4xl mb-3 text-gray-400"></i>
                <p class="text-lg">雲端目前沒有任何題目，請點擊上方按鈕上傳。</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 更新為您提供的 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCan2_Rc26HsLkOPr0i5QrgdjAYyqcigJ0",
            authDomain: "english-reading-6b506.firebaseapp.com",
            projectId: "english-reading-6b506",
            storageBucket: "english-reading-6b506.firebasestorage.app",
            messagingSenderId: "494747176273",
            appId: "1:494747176273:web:585487fadb29b2e5e2d770",
            measurementId: "G-4JD6R9MRPQ"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gept-writing-mock-v1'; 
        const COL_QUESTIONS = 'GEPT-Questions';
        
        let app, db, auth;

        // =========================================================
        // ✍️ 您的「後台題庫區」：未來要加新題目，只要照格式加在這邊即可
        // =========================================================
        const questionsData = [
            { id: "q1", type: "Guided Writing (引導寫作)", title: "例題 I - 父母的獎勵", instructions: "請依下面所提供的文字提示寫一篇英文作文，長度約 120 字（8 至 12 個句子）。", prompt: "一般來說，孩子表現良好時，父母常會給孩子獎勵。請寫一篇文章說明：\n(1) 你表現好的時候，你的父母通常會用哪些方法獎勵你？你覺得這些方法有效、適當嗎？\n(2) 如果有一天你為人父母，你會用相同的獎勵方式嗎？", sample: "When I perform well, my parents usually reward me with encouraging words and sometimes a special meal at my favorite restaurant. I find these methods both effective and appropriate because they make me feel valued without spoiling me with expensive gifts. The verbal praise boosts my confidence, while the special meal serves as a memorable celebration.\n\n【中文翻譯】\n當我表現好時，我的父母通常會用鼓勵的話語來獎勵我，有時也會帶我去我最喜歡的餐廳吃一頓特別的大餐。我覺得這些方法既有效又適當，因為它們讓我感到受重視，而不會用昂貴的禮物寵壞我。口頭上的讚美提升了我的自信心，而特別的餐點則作為一次難忘的慶祝。\n\nIf I become a parent someday, I will likely use similar rewarding methods. I believe that emotional support and shared experiences are more precious than material items. However, I might also incorporate a system where my children can earn extra free time for their hobbies, encouraging them to pursue their interests.\n\n【中文翻譯】\n如果有一天我為人父母，我很可能也會使用類似的獎勵方式。我相信情感上的支持和共同的經歷比物質更珍貴。然而，我也可能會加入一種制度，讓孩子們能為自己的興趣賺取額外的空閒時間，鼓勵他們追求自己的愛好。" },
            { id: "q2", type: "Email (信函寫作)", title: "例題 II - 給轉學筆友的建議", instructions: "請依以下提示寫一封英文 email，長度約 120 字（8 至 12 個句子）。此信可以是一個完整的段落，也可以分段。", prompt: "你住在美國的筆友 Ted 最近剛轉學，正在煩惱新學校的交友問題。請寫一封英文 email 給他，信的內容必須包括以下兩點：\n(1) 分享你適應新環境的經驗。\n(2) 建議他幾個交新朋友的方法。", sample: "I was sorry to hear that you are struggling to make friends at your new school. I know exactly how you feel, as I experienced the same anxiety when I transferred to my current high school two years ago. Initially, I felt lonely, but I gradually adapted by giving myself time and keeping an open mind.\n\n【中文翻譯】\n聽到你在新學校交友遇到困難，我感到很遺憾。我完全了解你的感受，因為兩年前我轉學到現在的高中時，也經歷過同樣的焦慮。起初，我感到很孤單，但我給自己時間並保持開放的心態，逐漸適應了。\n\nTo make new friends, I suggest you join some school clubs that match your interests, like the basketball team or the photography club. This is a great way to meet people who share similar hobbies. Additionally, don't be afraid to strike up a conversation with your classmates during breaks. A simple smile and a friendly \"hello\" can go a long way. Hang in there, and things will get better soon!\n\n【中文翻譯】\n為了結交新朋友，我建議你加入一些符合你興趣的學校社團，像是籃球隊或攝影社。這是認識有相同嗜好的人的絕佳方式。此外，不要害怕在下課時間主動與同學攀談。一個簡單的微笑和友善的「你好」會有很大的幫助。撐著點，事情很快就會好轉的！" },
            { id: "q3", type: "Guided Writing (引導寫作)", title: "智慧型手機的影響", instructions: "字數約 120 字。可以分段。", prompt: "智慧型手機為現代人帶來便利，但也衍生出一些問題。請寫一篇文章：\n(1) 說明智慧型手機為你的生活帶來的優點與缺點。\n(2) 你認為應該如何健康地使用智慧型手機？", sample: "Smartphones have brought both significant benefits and drawbacks to my life. On the positive side, they provide immense convenience. I can easily keep in touch with friends, search for information instantly, and use various apps to manage my schedule. However, the downside is that I sometimes become too distracted by social media, which affects my concentration on studies and leads to eye strain.\n\n【中文翻譯】\n智慧型手機為我的生活帶來了顯著的好處與壞處。在積極的一面，它們提供了極大的便利。我可以輕鬆地與朋友保持聯繫、即時搜尋資訊，並使用各種應用程式來管理我的行程。然而，缺點是我有時會因為社群媒體而過度分心，這影響了我讀書的專注力，並導致眼睛疲勞。\n\nTo use smartphones healthily, I believe we should set clear boundaries. For instance, we can turn off unnecessary notifications while studying and avoid using screens an hour before bedtime. By practicing self-discipline, we can enjoy the convenience of technology without letting it control our lives.\n\n【中文翻譯】\n為了健康地使用智慧型手機，我認為我們應該設定明確的界線。例如，我們可以在讀書時關閉不必要的通知，並避免在睡前一小時使用螢幕。透過練習自律，我們可以享受科技的便利，而不讓它控制我們的生活。" },
            { id: "q4", type: "Email (信函寫作)", title: "取消約會與道歉", instructions: "字數約 120 字。上下款不計。", prompt: "你原本和外國朋友 Sarah 約好這週末一起去參觀博物館，但你因為生病無法前往。請寫一封 email：\n(1) 解釋你無法赴約的原因並表達歉意。\n(2) 提議下週或未來的另一個時間重新安排行程。", sample: "I am writing to sincerely apologize for having to cancel our plans to visit the museum this weekend. Unfortunately, I have caught a severe cold and my doctor has advised me to stay home and rest. I was really looking forward to our trip and I feel terrible for letting you down at the last minute.\n\n【中文翻譯】\n我寫這封信是要為必須取消這週末我們參觀博物館的計畫致上最誠摯的歉意。很不幸地，我得了重感冒，醫生建議我留在家裡休息。我原本非常期待我們的旅程，對於在最後一刻讓你失望，我感到非常糟糕。\n\nWould it be possible to reschedule our visit for next Saturday? I should be fully recovered by then. If next weekend doesn't work for you, please let me know when you are available. Once again, I am so sorry for the inconvenience, and I hope we can meet up soon.\n\n【中文翻譯】\n我們有可能將參觀重新安排在下週六嗎？到那時我應該已經完全康復了。如果下週末你不行，請告訴我你有空的時間。對於造成的不便我再次感到抱歉，希望我們能很快見面。" },
            { id: "q5", type: "Guided Writing (引導寫作)", title: "網路購物 vs 實體店面", instructions: "字數約 120 字。", prompt: "現代人購物的管道多元。請寫一篇文章比較：\n(1) 你比較喜歡網路購物還是去實體店面購物？為什麼？\n(2) 描述一次讓你印象深刻的購物經驗（好或壞皆可）。", sample: "I generally prefer online shopping to visiting physical stores. The primary reason is the incredible convenience it offers; I can browse products, compare prices, and read reviews at any time without leaving my room. Furthermore, online platforms often provide a wider variety of items than local shops.\n\n【中文翻譯】\n總體而言，我比較喜歡網路購物，勝過去實體店面。最主要的原因是它提供了難以置信的便利性；我可以在任何時間瀏覽商品、比較價格並閱讀評論，而不需要離開我的房間。此外，網路平台通常比當地商店提供更多樣化的商品。\n\nA memorable experience I had was when I ordered a winter coat online last year. The delivery was remarkably fast, and the coat fit perfectly. However, the best part was that the seller included a handwritten thank-you note and a small pair of gloves as a gift. This unexpected personal touch made the online shopping experience surprisingly warm and delightful.\n\n【中文翻譯】\n我有一個難忘的經驗是去年在網路上訂購了一件冬裝外套。送貨速度非常快，而且外套非常合身。然而，最棒的部分是賣家附上了一張手寫的感謝卡和一小副手套作為禮物。這種意想不到的人情味讓這次的網路購物體驗出奇地溫暖與令人愉悅。" },
            { id: "q6", type: "Email (信函寫作)", title: "邀請外國朋友來台灣", instructions: "字數約 120 字。", prompt: "你的外國朋友 John 計畫來亞洲旅遊。請寫一封信邀請他來台灣：\n(1) 推薦一個台灣的特色景點並說明原因。\n(2) 介紹一項他一定要品嚐的台灣美食。", sample: "I heard you are planning a trip to Asia, and I would love to invite you to visit Taiwan! It is a beautiful island with friendly people and amazing sights.\n\n【中文翻譯】\n我聽說你正在計畫一趟亞洲之旅，我非常樂意邀請你來台灣玩！這是一個擁有友善人民和迷人風景的美麗島嶼。\n\nIf you come, I highly recommend visiting Taroko Gorge in Hualien. The marble canyons are absolutely breathtaking, and walking along the trails offers an unforgettable natural experience. Besides the scenery, you must try our famous beef noodle soup. The rich, savory broth combined with tender beef and chewy noodles is a true masterpiece of Taiwanese cuisine. I would be thrilled to be your tour guide. Let me know if you decide to come!\n\n【中文翻譯】\n如果你來，我強烈推薦參觀花蓮的太魯閣峽谷。大理石峽谷絕對令人嘆為觀止，沿著步道行走能提供難忘的大自然體驗。除了風景，你一定要嚐嚐我們著名的牛肉麵。濃郁美味的湯頭，加上軟嫩的牛肉和有嚼勁的麵條，真的是台灣美食的傑作。如果你決定來，我會非常高興能成為你的導遊。讓我知道你的決定！" },
            { id: "q7", type: "Guided Writing (引導寫作)", title: "日常生活中的環保", instructions: "字數約 120 字。", prompt: "環境保護是全球關注的議題。請寫一篇文章說明：\n(1) 在日常生活中，你做了哪些具體的環保行動？\n(2) 你認為每個人微小的環保舉動能帶來什麼改變？", sample: "Environmental protection is a crucial issue, and I try to do my part in daily life. Specifically, I always carry a reusable water bottle and canvas shopping bags to reduce plastic waste. Additionally, I make it a habit to turn off lights and unplug appliances when they are not in use to conserve energy.\n\n【中文翻譯】\n環境保護是一個至關重要的議題，而我試著在日常生活中盡一份心力。具體來說，我總是攜帶可重複使用的水瓶和帆布購物袋，以減少塑膠垃圾。此外，我養成了一個習慣：不使用時隨手關燈並拔掉電器插頭以節約能源。\n\nI firmly believe that even minor eco-friendly actions can lead to significant changes. When millions of people adopt these small habits, the cumulative effect can massively reduce global carbon emissions and pollution. Ultimately, protecting the earth starts with individual responsibility, and every little effort counts towards a sustainable future.\n\n【中文翻譯】\n我堅信，即使是微小的環保行動也能帶來重大的改變。當數百萬人養成這些小習慣時，累積的效果將能大幅減少全球碳排放與污染。最終，保護地球始於個人責任，每一個微小的努力都對永續發展的未來有所貢獻。" },
            { id: "q8", type: "Email (信函寫作)", title: "向飯店尋找遺失物", instructions: "字數約 120 字。", prompt: "你上週在國外旅遊時入住一間飯店，退房回國後發現把一件重要的外套忘在房間了。請寫信給飯店：\n(1) 描述該外套的特徵以及你住的房號與日期。\n(2) 詢問他們是否尋獲，並說明你願意支付寄回的運費。", sample: "I am writing to inquire about an item I believe I left behind during my recent stay at your hotel. I checked out on May 15th from room 302.\n\n【中文翻譯】\n我寫這封信是想詢問一件我認為在最近入住貴飯店時遺留的物品。我是在 5 月 15 日從 302 號房退房的。\n\nI am missing a dark blue, waterproof jacket with a silver zipper. It is very important to me as it was a birthday gift. Could you please check with your housekeeping department to see if it was found in the room or the closet? If it has been located, I would be extremely grateful if you could arrange to have it shipped to my home address in Taiwan. I will, of course, cover all the shipping expenses. Thank you for your assistance.\n\n【中文翻譯】\n我弄丟了一件深藍色、有銀色拉鍊的防水外套。它對我非常重要，因為這是一份生日禮物。您能幫忙向房務部確認是否在房間或衣櫥裡找到它嗎？如果找到了，如果您能安排將它寄到我在台灣的家庭地址，我將不勝感激。當然，我會負擔所有的運費。感謝您的協助。" },
            { id: "q9", type: "Guided Writing (引導寫作)", title: "學習第二外語的重要性", instructions: "字數約 120 字。", prompt: "除了英文，越來越多人學習第二外語（如日文、韓文、法文等）。請說明：\n(1) 你有學習第二外語的經驗或計畫嗎？為什麼選擇該語言？\n(2) 學習多種語言對未來的職涯或生活有什麼幫助？", sample: "Besides English, I have been planning to learn Japanese as my second foreign language. I chose Japanese because I am deeply fascinated by Japanese culture, especially their animation and traditional arts. Furthermore, traveling to Japan is one of my biggest dreams, and knowing the language would make the trip much more enjoyable.\n\n【中文翻譯】\n除了英文之外，我一直計畫學習日文作為我的第二外語。我選擇日文是因為我對日本文化深深著迷，特別是他們的動畫和傳統藝術。此外，去日本旅遊是我最大的夢想之一，而懂這門語言會讓旅程更加愉快。\n\nI believe that mastering multiple languages is highly beneficial for both career and life. In the workplace, being multilingual makes you a more competitive candidate in the global market, opening doors to international companies. In life, it allows you to connect with people from diverse backgrounds and understand different cultures from a broader perspective.\n\n【中文翻譯】\n我相信精通多種語言對職涯和生活都非常有利。在職場上，具備多語能力能讓你在全球市場中成為更具競爭力的候選人，為進入國際公司開啟大門。在生活中，它能讓你與不同背景的人建立聯繫，並從更廣闊的視角了解不同的文化。" },
            { id: "q10", type: "Email (信函寫作)", title: "感謝寄宿家庭", instructions: "字數約 120 字。", prompt: "你在英國遊學一個月，期間住在一個寄宿家庭(Mr. and Mrs. Smith)。現在你已回到台灣，請寫信給他們：\n(1) 感謝他們這段期間的照顧，並提及一件令你印象深刻的事。\n(2) 分享你目前的近況，並邀請他們未來有機會來台灣玩。", sample: "I am writing to let you know that I have arrived in Taiwan safely. I want to express my deepest gratitude for your warm hospitality during my one-month stay in the UK. You made me feel like part of the family. I will never forget the weekend we spent baking apple pie together; it was the most delicious pie I have ever tasted!\n\n【中文翻譯】\n我寫這封信是想讓你們知道我已經安全抵達台灣了。對於我在英國停留一個月期間你們熱情的款待，我想表達最深的謝意。你們讓我感覺就像是一家人。我永遠不會忘記我們一起烤蘋果派的那個週末；那是我嚐過最美味的派！\n\nI have now returned to my normal school routine and am busy catching up on my studies. If you ever plan to travel to Asia, please consider visiting Taiwan. I would be more than happy to show you around and treat you to some traditional Taiwanese food. Keep in touch!\n\n【中文翻譯】\n我現在已經回歸正常的學校作息，正忙著趕上我的課業。如果未來你們有計畫到亞洲旅遊，請考慮來台灣玩。我會非常樂意帶你們四處逛逛，並請你們品嚐一些傳統的台灣美食。保持聯絡！" }
        ];

        function log(msg) {
            const logArea = document.getElementById('log-area');
            logArea.classList.remove('hidden');
            logArea.innerHTML += `<div>> ${msg}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        // 登入初始化
        async function init() {
            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
            app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
            
            // 登入完成後，自動去雲端撈出現有資料來顯示
            fetchCloudQuestions();
        }

        // 把本地陣列上傳到雲端
        window.startMigration = async () => {
            const btn = document.getElementById('migrate-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上傳中，請稍候...';
            btn.classList.replace('bg-orange-500', 'bg-gray-400');
            
            try {
                let count = 0;
                for (const q of questionsData) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', COL_QUESTIONS, q.id);
                    await setDoc(docRef, q);
                    count++;
                    log(`✅ 成功同步: ${q.id} - ${q.title}`);
                }

                log(`🎉 同步完成！總共更新了 ${count} 題。`);
                btn.innerHTML = '<i class="fas fa-check-circle"></i> 題庫同步完成！';
                btn.classList.replace('bg-gray-400', 'bg-green-500');
                
                // 上傳完自動重撈一次列表更新畫面
                setTimeout(fetchCloudQuestions, 1000);

            } catch (error) {
                console.error(error);
                log(`<span class="text-red-500">❌ 發生錯誤: ${error.message}</span>`);
                btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 上傳失敗';
                btn.classList.replace('bg-gray-400', 'bg-red-500');
            }
        };

        // 從雲端撈資料顯示在表格中
        window.fetchCloudQuestions = async () => {
            document.getElementById('cloud-loading').classList.remove('hidden');
            document.getElementById('table-container').classList.add('hidden');
            document.getElementById('cloud-empty').classList.add('hidden');
            
            try {
                const qRef = collection(db, 'artifacts', appId, 'public', 'data', COL_QUESTIONS);
                const qSnap = await getDocs(qRef);
                
                if (qSnap.empty) {
                    document.getElementById('cloud-loading').classList.add('hidden');
                    document.getElementById('cloud-empty').classList.remove('hidden');
                    return;
                }

                let cloudData = [];
                qSnap.forEach(doc => {
                    cloudData.push({ id: doc.id, ...doc.data() });
                });

                // 排序
                cloudData.sort((a, b) => {
                    const numA = parseInt(a.id.replace('q', '')) || 0;
                    const numB = parseInt(b.id.replace('q', '')) || 0;
                    return numA - numB;
                });

                // 渲染表格
                const tbody = document.getElementById('cloud-questions-list');
                tbody.innerHTML = cloudData.map(q => `
                    <tr class="hover:bg-gray-100 transition-colors">
                        <td class="p-4 border border-gray-200 font-mono text-blue-600">${q.id}</td>
                        <td class="p-4 border border-gray-200"><span class="bg-orange-100 text-orange-700 text-xs px-2 py-1 rounded-md font-medium">${q.type}</span></td>
                        <td class="p-4 border border-gray-200 font-bold text-gray-700">${q.title}</td>
                        <td class="p-4 border border-gray-200 text-center"><i class="fas fa-check-circle text-green-500 text-lg" title="已存在雲端"></i></td>
                    </tr>
                `).join('');

                document.getElementById('cloud-loading').classList.add('hidden');
                document.getElementById('table-container').classList.remove('hidden');

            } catch (error) {
                console.error("撈取資料失敗", error);
                document.getElementById('cloud-loading').innerHTML = `<p class="text-red-500 font-bold"><i class="fas fa-times-circle"></i> 讀取失敗，請確認權限設定。</p>`;
            }
        };

        // 啟動程式
        init();

    </script>
</body>
</html>
