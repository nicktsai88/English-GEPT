<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEPT 中級寫作模擬平台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gept: {
                            light: '#FFF7ED',
                            base: '#FFEDD5',
                            primary: '#F97316',
                            dark: '#C2410C',
                            text: '#431407'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #FFF7ED; color: #431407; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1rem; transition: all 0.2s ease; }
        .day-header { font-weight: bold; color: #C2410C; text-align: center; padding: 4px; font-size: 1.1rem; }
        .day-empty { background-color: transparent; }
        .day-normal { background-color: #FFEDD5; color: #431407; }
        
        /* 完成的日期樣式：加入互動性與點擊游標 */
        .day-completed { background-color: #F97316; color: white; font-weight: bold; position: relative; box-shadow: 0 3px 6px rgba(249, 115, 22, 0.3); cursor: pointer; }
        .day-completed:hover { background-color: #EA580C; transform: translateY(-2px); box-shadow: 0 5px 10px rgba(249, 115, 22, 0.4); }
        .day-completed::after { content: '★'; position: absolute; top: 3px; right: 4px; font-size: 0.75rem; color: #FEF08A; }
        
        .loader { border: 4px solid #FFEDD5; border-top: 4px solid #F97316; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #FFEDD5; border-radius: 5px; }
        ::-webkit-scrollbar-thumb { background: #FDBA74; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #F97316; }

        /* 防止英文字過長不換行導致跑版 */
        .break-words { word-break: break-word; overflow-wrap: break-word; }

        /* --- Markdown 報告專用渲染樣式 (為大螢幕閱讀加強) --- */
        .markdown-body { color: #431407; line-height: 1.8; font-size: 1.1rem; }
        @media (min-width: 768px) { .markdown-body { font-size: 1.2rem; } }
        .markdown-body h1 { font-size: 1.75rem; font-weight: bold; color: #C2410C; margin: 2rem 0 1rem; border-bottom: 2px solid #FFEDD5; padding-bottom: 0.5rem; }
        .markdown-body h1:first-child { margin-top: 0; }
        .markdown-body h2 { font-size: 1.5rem; font-weight: bold; color: #9A3412; margin: 1.75rem 0 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .markdown-body h3 { font-size: 1.3rem; font-weight: bold; color: #F97316; margin: 1.5rem 0 0.5rem; }
        .markdown-body h4 { font-size: 1.15rem; font-weight: bold; color: #431407; margin: 1.25rem 0 0.5rem; background-color: #FFEDD5; padding: 0.35rem 0.85rem; border-radius: 0.5rem; display: inline-block; }
        .markdown-body p { margin-bottom: 1.2rem; }
        .markdown-body ul { list-style-type: none; padding-left: 0.5rem; margin-bottom: 1.2rem; }
        .markdown-body li { margin-bottom: 0.75rem; }
        .markdown-body strong { font-weight: 700; color: #b91c1c; } /* 凸顯錯誤或重點 */
        .markdown-body blockquote { border-left: 5px solid #F97316; background-color: #FFF7ED; padding: 1.5rem; margin: 1.5rem 0; border-radius: 0 0.5rem 0.5rem 0; font-style: italic; color: #78350F; font-size: 1.35rem; line-height: 1.9; }
        .markdown-body blockquote p:last-child { margin-bottom: 0; }
        /* Table Styles */
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; background-color: white; border-radius: 0.75rem; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .markdown-body th, .markdown-body td { border: 1px solid #FED7AA; padding: 1rem 1.25rem; text-align: left; }
        .markdown-body th { background-color: #FFEDD5; font-weight: bold; color: #9A3412; white-space: nowrap; font-size: 1.1rem; }
        .markdown-body tr:nth-child(even) { background-color: #FFF7ED; }
        .markdown-body hr { border: 0; border-top: 2px dashed #FDBA74; margin: 2.5rem 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Toast Container -->

    <!-- Top Navigation -->

        <!-- 1. Login View -->
        <div id="login-view" class="max-w-xl w-full bg-white p-10 rounded-2xl shadow-lg border border-orange-100 view-section mt-12">

        <!-- 2. Dashboard View -->

            <div class="flex flex-col md:flex-row gap-8 w-full">
                <!-- Left: Calendar Profile -->
                <div class="w-full md:w-[35%] xl:w-[30%] bg-white p-8 rounded-3xl shadow-md border border-orange-100 h-fit shrink-0">
                    <div class="text-center mb-8">

                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <h2 class="text-2xl font-bold break-words" id="dashboard-username">使用者</h2>
                        <p class="text-base text-gray-500 mt-2">你的專屬寫作練習區</p>
                    </div>
                    
                    <div class="border-t border-orange-100 pt-6">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold text-lg text-gept-dark flex items-center gap-2"><i class="far fa-calendar-check"></i>學習日曆</h3>
                            <!-- 新增切換月份的按鈕區塊 -->

                                <span id="calendar-month-year" class="text-base tracking-wide min-w-[80px] text-center"></span>
                                <button onclick="changeMonth(1)" class="hover:text-orange-500 transition-colors p-1"><i class="fas fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div class="calendar-grid mb-3">
                            <div class="day-header">日</div><div class="day-header">一</div><div class="day-header">二</div><div class="day-header">三</div><div class="day-header">四</div><div class="day-header">五</div><div class="day-header">六</div>
                        </div>
                        <div id="calendar-body" class="calendar-grid"></div>
                        <div class="mt-6 text-sm text-gray-500 flex items-center justify-center gap-3 bg-gray-50 py-2 rounded-lg">
                            <span class="w-4 h-4 inline-block bg-gept-primary rounded shadow-sm relative"><span class="absolute top-[-1px] right-[1px] text-[10px] text-yellow-200">★</span></span> 
                            <span>表示當日有紀錄 <strong class="text-gept-dark">(點擊可看解析)</strong></span>
                        </div>
                    </div>
                </div>

                <!-- Right: Question List -->

                <h2 class="text-2xl md:text-3xl font-bold text-gept-dark flex items-center gap-3">
                    <i class="fas fa-robot text-orange-500 text-3xl md:text-4xl"></i> AI 老師指導報告
                </h2>
                <div class="flex gap-3 w-full sm:w-auto">
                    <button onclick="appState.showView('test')" class="flex-1 sm:flex-none px-6 py-3 border-2 border-gept-primary text-gept-primary rounded-xl hover:bg-orange-50 font-bold transition-colors text-center text-lg shadow-sm">

                    </button>
                    <button onclick="appState.showView('dashboard')" class="flex-1 sm:flex-none px-6 py-3 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 font-bold transition-colors text-center text-lg shadow-sm">

    </main>

    <script type="module">
        // --- Custom Toast Notification System ---
        window.showToast = (message, type = 'info') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColors = {
                'error': 'bg-red-600',
                'success': 'bg-green-600',
                'info': 'bg-gray-800'
            };
            
            let icon = 'fa-info-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            if (type === 'success') icon = 'fa-check-circle';

            toast.className = `${bgColors[type] || bgColors['info']} text-white px-6 py-4 rounded-xl shadow-2xl transform transition-all duration-300 translate-y-12 opacity-0 flex items-start gap-4 max-w-[90vw] sm:max-w-lg pointer-events-auto border border-white/20`;
            toast.innerHTML = `<i class="fas ${icon} mt-1.5 text-xl shrink-0"></i><div class="text-base font-medium leading-relaxed break-words whitespace-pre-wrap">${message}</div>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-12', 'opacity-0');
            });
            
            const duration = type === 'error' ? 5000 : 3000;
            setTimeout(() => {
                toast.classList.add('translate-y-12', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        };

        // --- 1. Question Data (Mock GEPT Intermediate) ---
        const questionsData = [
            { id: "q1", type: "Guided Writing (引導寫作)", title: "例題 I - 父母的獎勵", instructions: "請依下面所提供的文字提示寫一篇英文作文，長度約 120 字（8 至 12 個句子）。", prompt: "一般來說，孩子表現良好時，父母常會給孩子獎勵。請寫一篇文章說明：\n(1) 你表現好的時候，你的父母通常會用哪些方法獎勵你？你覺得這些方法有效、適當嗎？\n(2) 如果有一天你為人父母，你會用相同的獎勵方式嗎？", sample: "When I perform well, my parents usually reward me with encouraging words and sometimes a special meal at my favorite restaurant. I find these methods both effective and appropriate because they make me feel valued without spoiling me with expensive gifts. The verbal praise boosts my confidence, while the special meal serves as a memorable celebration.\n\nIf I become a parent someday, I will likely use similar rewarding methods. I believe that emotional support and shared experiences are more precious than material items. However, I might also incorporate a system where my children can earn extra free time for their hobbies, encouraging them to pursue their interests." },
            { id: "q2", type: "Email (信函寫作)", title: "例題 II - 給轉學筆友的建議", instructions: "請依以下提示寫一封英文 email，長度約 120 字（8 至 12 個句子）。此信可以是一個完整的段落，也可以分段。", prompt: "你住在美國的筆友 Ted 最近剛轉學，正在煩惱新學校的交友問題。請寫一封英文 email 給他，信的內容必須包括以下兩點：\n(1) 分享你適應新環境的經驗。\n(2) 建議他幾個交新朋友的方法。", sample: "I was sorry to hear that you are struggling to make friends at your new school. I know exactly how you feel, as I experienced the same anxiety when I transferred to my current high school two years ago. Initially, I felt lonely, but I gradually adapted by giving myself time and keeping an open mind.\n\nTo make new friends, I suggest you join some school clubs that match your interests, like the basketball team or the photography club. This is a great way to meet people who share similar hobbies. Additionally, don't be afraid to strike up a conversation with your classmates during breaks. A simple smile and a friendly \"hello\" can go a long way. Hang in there, and things will get better soon!" },
            { id: "q3", type: "Guided Writing (引導寫作)", title: "智慧型手機的影響", instructions: "字數約 120 字。可以分段。", prompt: "智慧型手機為現代人帶來便利，但也衍生出一些問題。請寫一篇文章：\n(1) 說明智慧型手機為你的生活帶來的優點與缺點。\n(2) 你認為應該如何健康地使用智慧型手機？", sample: "Smartphones have brought both significant benefits and drawbacks to my life. On the positive side, they provide immense convenience. I can easily keep in touch with friends, search for information instantly, and use various apps to manage my schedule. However, the downside is that I sometimes become too distracted by social media, which affects my concentration on studies and leads to eye strain.\n\nTo use smartphones healthily, I believe we should set clear boundaries. For instance, we can turn off unnecessary notifications while studying and avoid using screens an hour before bedtime. By practicing self-discipline, we can enjoy the convenience of technology without letting it control our lives." },
            { id: "q4", type: "Email (信函寫作)", title: "取消約會與道歉", instructions: "字數約 120 字。上下款不計。", prompt: "你原本和外國朋友 Sarah 約好這週末一起去參觀博物館，但你因為生病無法前往。請寫一封 email：\n(1) 解釋你無法赴約的原因並表達歉意。\n(2) 提議下週或未來的另一個時間重新安排行程。", sample: "I am writing to sincerely apologize for having to cancel our plans to visit the museum this weekend. Unfortunately, I have caught a severe cold and my doctor has advised me to stay home and rest. I was really looking forward to our trip and I feel terrible for letting you down at the last minute.\n\nWould it be possible to reschedule our visit for next Saturday? I should be fully recovered by then. If next weekend doesn't work for you, please let me know when you are available. Once again, I am so sorry for the inconvenience, and I hope we can meet up soon." },
            { id: "q5", type: "Guided Writing (引導寫作)", title: "網路購物 vs 實體店面", instructions: "字數約 120 字。", prompt: "現代人購物的管道多元。請寫一篇文章比較：\n(1) 你比較喜歡網路購物還是去實體店面購物？為什麼？\n(2) 描述一次讓你印象深刻的購物經驗（好或壞皆可）。", sample: "I generally prefer online shopping to visiting physical stores. The primary reason is the incredible convenience it offers; I can browse products, compare prices, and read reviews at any time without leaving my room. Furthermore, online platforms often provide a wider variety of items than local shops.\n\nA memorable experience I had was when I ordered a winter coat online last year. The delivery was remarkably fast, and the coat fit perfectly. However, the best part was that the seller included a handwritten thank-you note and a small pair of gloves as a gift. This unexpected personal touch made the online shopping experience surprisingly warm and delightful." },
            { id: "q6", type: "Email (信函寫作)", title: "邀請外國朋友來台灣", instructions: "字數約 120 字。", prompt: "你的外國朋友 John 計畫來亞洲旅遊。請寫一封信邀請他來台灣：\n(1) 推薦一個台灣的特色景點並說明原因。\n(2) 介紹一項他一定要品嚐的台灣美食。", sample: "I heard you are planning a trip to Asia, and I would love to invite you to visit Taiwan! It is a beautiful island with friendly people and amazing sights.\n\nIf you come, I highly recommend visiting Taroko Gorge in Hualien. The marble canyons are absolutely breathtaking, and walking along the trails offers an unforgettable natural experience. Besides the scenery, you must try our famous beef noodle soup. The rich, savory broth combined with tender beef and chewy noodles is a true masterpiece of Taiwanese cuisine. I would be thrilled to be your tour guide. Let me know if you decide to come!" },
            { id: "q7", type: "Guided Writing (引導寫作)", title: "日常生活中的環保", instructions: "字數約 120 字。", prompt: "環境保護是全球關注的議題。請寫一篇文章說明：\n(1) 在日常生活中，你做了哪些具體的環保行動？\n(2) 你認為每個人微小的環保舉動能帶來什麼改變？", sample: "Environmental protection is a crucial issue, and I try to do my part in daily life. Specifically, I always carry a reusable water bottle and canvas shopping bags to reduce plastic waste. Additionally, I make it a habit to turn off lights and unplug appliances when they are not in use to conserve energy.\n\nI firmly believe that even minor eco-friendly actions can lead to significant changes. When millions of people adopt these small habits, the cumulative effect can massively reduce global carbon emissions and pollution. Ultimately, protecting the earth starts with individual responsibility, and every little effort counts towards a sustainable future." },
            { id: "q8", type: "Email (信函寫作)", title: "向飯店尋找遺失物", instructions: "字數約 120 字。", prompt: "你上週在國外旅遊時入住一間飯店，退房回國後發現把一件重要的外套忘在房間了。請寫信給飯店：\n(1) 描述該外套的特徵以及你住的房號與日期。\n(2) 詢問他們是否尋獲，並說明你願意支付寄回的運費。", sample: "I am writing to inquire about an item I believe I left behind during my recent stay at your hotel. I checked out on May 15th from room 302.\n\nI am missing a dark blue, waterproof jacket with a silver zipper. It is very important to me as it was a birthday gift. Could you please check with your housekeeping department to see if it was found in the room or the closet? If it has been located, I would be extremely grateful if you could arrange to have it shipped to my home address in Taiwan. I will, of course, cover all the shipping expenses. Thank you for your assistance." },
            { id: "q9", type: "Guided Writing (引導寫作)", title: "學習第二外語的重要性", instructions: "字數約 120 字。", prompt: "除了英文，越來越多人學習第二外語（如日文、韓文、法文等）。請說明：\n(1) 你有學習第二外語的經驗或計畫嗎？為什麼選擇該語言？\n(2) 學習多種語言對未來的職涯或生活有什麼幫助？", sample: "Besides English, I have been planning to learn Japanese as my second foreign language. I chose Japanese because I am deeply fascinated by Japanese culture, especially their animation and traditional arts. Furthermore, traveling to Japan is one of my biggest dreams, and knowing the language would make the trip much more enjoyable.\n\nI believe that mastering multiple languages is highly beneficial for both career and life. In the workplace, being multilingual makes you a more competitive candidate in the global market, opening doors to international companies. In life, it allows you to connect with people from diverse backgrounds and understand different cultures from a broader perspective." },
            { id: "q10", type: "Email (信函寫作)", title: "感謝寄宿家庭", instructions: "字數約 120 字。", prompt: "你在英國遊學一個月，期間住在一個寄宿家庭(Mr. and Mrs. Smith)。現在你已回到台灣，請寫信給他們：\n(1) 感謝他們這段期間的照顧，並提及一件令你印象深刻的事。\n(2) 分享你目前的近況，並邀請他們未來有機會來台灣玩。", sample: "I am writing to let you know that I have arrived in Taiwan safely. I want to express my deepest gratitude for your warm hospitality during my one-month stay in the UK. You made me feel like part of the family. I will never forget the weekend we spent baking apple pie together; it was the most delicious pie I have ever tasted!\n\nI have now returned to my normal school routine and am busy catching up on my studies. If you ever plan to travel to Asia, please consider visiting Taiwan. I would be more than happy to show you around and treat you to some traditional Taiwanese food. Keep in touch!" }
        ];

        // --- 2. Firebase Setup ---

        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCan2_Rc26HsLkOPr0i5QrgdjAYyqcigJ0",

        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gept-writing-mock-v1'; 
        const apiKey = ""; 

        const COLLECTION_NAME = 'GEPT-Writing';
        const DOC_GLOBAL = 'global';

        let app, db, auth;
        let currentUserUid = null;
        let currentUserName = null;
        let isFirebaseReady = false;
        let userProfileData = { history: {}, completedDates: [] };

        // 紀錄當前日曆檢視的年月
        let currentCalendarDate = new Date();

        window.appState = {

                if(viewId === 'dashboard' && !currentUserName) {

        // --- API Key Modal Logic ---
        window.openApiModal = () => {
            const storedKey = localStorage.getItem('gemini_api_key');
            if(storedKey) document.getElementById('api-key-input').value = storedKey;
            document.getElementById('api-key-modal').classList.remove('hidden');
        };

        window.closeApiModal = () => {
            document.getElementById('api-key-modal').classList.add('hidden');
        };

            const key = document.getElementById('api-key-input').value.trim();
            if(key) {
                localStorage.setItem('gemini_api_key', key);
                closeApiModal();
                showToast('✅ API 金鑰已安全儲存！請再次嘗試提交批改。', 'success');
            } else {
                showToast('請輸入有效的金鑰', 'error');
            }
        };

        function updateConnectionStatus(status, text) {
            const light = document.getElementById('status-light');
            const txt = document.getElementById('status-text');
            txt.textContent = text;
            light.className = 'w-3 h-3 rounded-full shrink-0 ' + 
                (status === 'loading' ? 'bg-yellow-400 animate-pulse' : 
                 status === 'success' ? 'bg-green-500' : 'bg-red-500');
        }

        async function initFirebase() {
            try {
                updateConnectionStatus('loading', '連線至資料庫...');
                const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
                app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (authError) {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUserUid = user.uid;
                        isFirebaseReady = true;
                        updateConnectionStatus('success', '系統就緒');
                        listenToGlobalUsers();
                    } else {
                        isFirebaseReady = false;
                    }
                });
            } catch (error) {
                console.error("Firebase Init Error:", error);
                updateConnectionStatus('error', '連線失敗');
                showToast('無法連線至資料庫', 'error');
            }
        }

        function listenToGlobalUsers() {
            if(!currentUserUid || !isFirebaseReady) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, DOC_GLOBAL);
            
            onSnapshot(globalRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.users && Array.isArray(data.users)) {
                        const names = data.users.map(u => typeof u === 'string' ? u : u.name).filter(Boolean);
                        const uniqueNames = [...new Set(names)].reverse();
                        renderQuickLogin(uniqueNames);
                    } else {
                        renderQuickLogin([]);
                    }
                } else {
                    renderQuickLogin([]);
                }
            }, (error) => {
                console.error("Listen global error:", error);
                updateConnectionStatus('error', '同步名單失敗');
            });
        }

        window.handleLogin = async (nameOverride) => {
            const nameInput = document.getElementById('login-name').value;
            const finalName = (nameOverride || nameInput).trim();
            if (!finalName) return showToast("請輸入您的姓名", "error");
            if (!isFirebaseReady) return showToast("系統連線中，請稍候...", "info");

            const loginBtn = document.querySelector('button[onclick="handleLogin()"]');
            const originalText = loginBtn.innerText;
            loginBtn.innerText = '登入中...';
            loginBtn.disabled = true;

            try {
                const globalRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, DOC_GLOBAL);
                const globalSnap = await getDoc(globalRef);
                let users = globalSnap.exists() ? globalSnap.data().users || [] : [];
                
                const stringUsers = users.map(u => typeof u === 'string' ? u : u.name).filter(Boolean);
                if (!stringUsers.includes(finalName)) {
                    stringUsers.push(finalName);
                    await setDoc(globalRef, { users: stringUsers }, { merge: true });
                }

                currentUserName = finalName;
                document.getElementById('header-user').classList.remove('hidden');
                document.getElementById('header-user').classList.add('flex');
                document.getElementById('header-username').textContent = finalName;
                document.getElementById('dashboard-username').textContent = finalName;

                subscribeToUserData(finalName);
                appState.showView('dashboard');
                showToast(`歡迎回來，${finalName}！`, 'success');
            } catch (e) {
                console.error("Login Error:", e);
                showToast("登入失敗，請檢查網路連線後重試。", "error");
            } finally {
                loginBtn.innerText = originalText;
                loginBtn.disabled = false;
            }
        };

        function subscribeToUserData(userName) {
            if (unsubscribeUser) unsubscribeUser();
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, `user_${userName}`);
            
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userProfileData = docSnap.data();
                    if(!userProfileData.completedDates) userProfileData.completedDates = [];
                    if(!userProfileData.history) userProfileData.history = {};
                } else {
                    userProfileData = { history: {}, completedDates: [] };
                    setDoc(userRef, userProfileData);
                }
                if(appState.currentView === 'dashboard') renderCalendar();
            }, (err) => console.error("User data listen error", err));
        }

        window.logout = () => {
            currentUserName = null;
            userProfileData = { history: {}, completedDates: [] };
            if(unsubscribeUser) unsubscribeUser();
            document.getElementById('header-user').classList.add('hidden');
            document.getElementById('header-user').classList.remove('flex');
            document.getElementById('login-name').value = '';
            appState.showView('login');
            showToast("已登出", "info");
        };

        // --- 新增：切換日曆月份 ---
        window.changeMonth = (delta) => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + delta);
            renderCalendar();
        };

        function renderCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            document.getElementById('calendar-month-year').textContent = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const calendarBody = document.getElementById('calendar-body');
            let html = '';
            
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="calendar-day day-empty"></div>`;
            }
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                // 判斷這一天是否有歷史紀錄
                const isCompleted = userProfileData.completedDates && userProfileData.completedDates.includes(dateString);
                
                if(isCompleted) {
                    html += `<div class="calendar-day day-completed" onclick="openHistoryModal('${dateString}')" title="點擊查看當日紀錄">${i}</div>`;
                } else {
                    html += `<div class="calendar-day day-normal">${i}</div>`;
                }
            }
            
            calendarBody.innerHTML = html;
        }

        // --- 新增：開啟並渲染歷史紀錄 Modal ---

                <div class="flex items-center gap-4 my-8">
                    <div class="flex-grow h-px bg-orange-200"></div>
                    <span class="text-orange-400 text-lg font-bold">AI 老師解析</span>
                    <div class="flex-grow h-px bg-orange-200"></div>
                </div>
                <div class="markdown-body bg-white p-2">
                    ${marked.parse(hist.feedback)}
                </div>
                <div class="mt-8 text-center">
                   <button onclick="closeHistoryModal()" class="px-8 py-3 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-xl font-bold text-lg transition-colors shadow-sm">關閉視窗</button>
                </div>
            `;
            content.innerHTML = html;
        };

        window.closeHistoryModal = () => {
            document.getElementById('history-modal').classList.add('hidden');
        };

        window.selectQuestion = (qId) => {
            appState.selectedQuestionId = qId;
            appState.showView('test');
        };

        function renderTestArea() {
            const q = questionsData.find(x => x.id === appState.selectedQuestionId);
            if(!q) return;

            document.getElementById('q-title').textContent = q.title;
            document.getElementById('q-type').textContent = q.type;
            document.getElementById('q-instructions').textContent = q.instructions;
            document.getElementById('q-prompt').textContent = q.prompt;
            document.getElementById('q-sample').textContent = q.sample;
            
            document.getElementById('q-sample').classList.add('hidden');
            document.getElementById('sample-text').textContent = '顯示範例文章';
            document.getElementById('sample-icon').className = 'fas fa-chevron-down';
            
            const textarea = document.getElementById('user-answer');
            const savedData = userProfileData.history[q.id];
            
            if (savedData && savedData.draft) {
                textarea.value = savedData.draft;
                document.getElementById('last-saved').textContent = `上次作答時間: ${savedData.lastUpdate}`;
            } else {
                textarea.value = '';
                document.getElementById('last-saved').textContent = '';
            }
            
            updateWordCount();
            window.scrollTo(0, 0);
        }

        window.toggleSample = () => {
            const sampleDiv = document.getElementById('q-sample');
            const isHidden = sampleDiv.classList.contains('hidden');
            if (isHidden) {
                sampleDiv.classList.remove('hidden');
                document.getElementById('sample-text').textContent = '隱藏範例文章';
                document.getElementById('sample-icon').className = 'fas fa-chevron-up';
            } else {
                sampleDiv.classList.add('hidden');
                document.getElementById('sample-text').textContent = '顯示範例文章';
                document.getElementById('sample-icon').className = 'fas fa-chevron-down';
            }
        };

        document.getElementById('user-answer').addEventListener('input', updateWordCount);
        function updateWordCount() {
            const text = document.getElementById('user-answer').value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            document.getElementById('word-count').textContent = `字數: ${words}`;
        }

        window.submitAnswer = async () => {
            const answer = document.getElementById('user-answer').value.trim();
            if (answer.split(/\s+/).length < 20) {
                showToast("作答內容太少，請至少輸入 20 個字以上再提交批改！", "error");
                return;
            }

            const q = questionsData.find(x => x.id === appState.selectedQuestionId);
            document.getElementById('ai-loading').classList.remove('hidden');
            
            try {
                // 先只保存草稿
                await saveProgress(answer, null);
                
                const feedbackData = await callGeminiAPI(q.prompt, answer);
                renderFeedback(feedbackData);
                
                // 批改完成後完整保存(包含 draft 與 feedback)
                await saveProgress(answer, feedbackData);
                
                appState.showView('feedback');
                window.scrollTo(0, 0);
                showToast("批改完成！紀錄已自動保存至雲端。", "success");

            } catch (e) {
                console.error("Submit Error:", e);
                if(e.message.includes("400")) {
                    showToast("批改失敗 (Error 400)\n您的舊金鑰可能已被 Google 停用。\n請至設定中輸入新金鑰。", "error");
                    setTimeout(openApiModal, 1500);
                } else if(e.message.includes("403")) {
                    showToast("批改失敗 (Error 403)\n缺少有效金鑰或權限不足。\n請設定您的專屬 API 金鑰！", "error");
                    setTimeout(openApiModal, 1500);
                } else if(e.message.includes("429")) {
                    showToast("批改失敗 (Error 429)\n請求太頻繁或免費額度已滿，請稍後再試。", "error");
                } else if(e.message.includes("404")) {
                    showToast("批改失敗 (Error 404)\n找不到 AI 模型，請聯絡開發人員。", "error");
                } else {
                    showToast("批改過程中發生錯誤，請稍後再試。\n" + e.message, "error");
                }
            } finally {
                document.getElementById('ai-loading').classList.add('hidden');
            }
        };

        // --- 優化：確實儲存 date 屬性供日曆查詢 ---
        async function saveProgress(draft, feedback) {
            if(!currentUserName) return;
            
            const qId = appState.selectedQuestionId;
            const now = new Date();
            // 建立標準 YYYY-MM-DD 格式以供日曆精準比對
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const timeStr = now.toLocaleString('zh-TW');

            let newHistory = { ...userProfileData.history };
            newHistory[qId] = {
                draft: draft,
                lastUpdate: timeStr,
                date: dateStr, // 新增精確的日期屬性
                feedback: feedback || (newHistory[qId] ? newHistory[qId].feedback : null)
            };

            let newDates = [...(userProfileData.completedDates || [])];
            // 當 feedback 存在時，確保這天在日曆上會亮起
            if (feedback && !newDates.includes(dateStr)) {
                newDates.push(dateStr);
            }

            const userRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, `user_${currentUserName}`);
            await setDoc(userRef, {
                history: newHistory,
                completedDates: newDates
            }, { merge: true });
        }

        async function callGeminiAPI(questionPrompt, userAnswer) {
            const systemPrompt = `你是一位專業、親切且充滿熱忱的英文寫作老師。你的目標是幫助學生找出英文作文中的盲點，並提供最詳細、易懂、且視覺排版豐富的解析報告。

請務必使用「繁體中文」進行解說，並嚴格遵循以下的 Markdown 輸出格式與架構，不可遺漏任何一個單元。為了確保在各種 App 介面上的相容性，請不要使用 HTML 標籤，請完全依賴 Markdown 與 Emoji 來做視覺區分。

### 輸出格式規定：

# 📝 英文寫作專屬指導報告
Hello! 我是你的專屬英文老師 👩‍🏫。針對你這次的寫作，我做了非常詳細的分析。接下來，我們一起來看看如何讓這篇文章變得更完美吧！✨

## 🌟 1. 教師總評語 (Overall Feedback)
### 👍 你的優點 (Strengths):
(列出 2-3 點學生寫得好的地方，例如切題度、語氣、連接詞使用等)
### 💡 進步空間 (Areas for Improvement):
(列出 2-3 點需要改進的整體問題，例如時態、代名詞、邏輯等)

## 🔍 2. 逐句錯誤與盲點解析 (Sentence-by-Sentence Analysis)
(請將學生有錯誤的句子挑出來，並嚴格使用以下 Emoji 條列式格式呈現，不可使用表格)：
#### 📝 【句子 1】
* 🍎 **❌ 你的原句：** (貼上學生的原句，將錯誤處用 **粗體** 標示)
* 💡 **📙 老師解析：** (詳細解釋文法或語意錯誤的原因)
* 🍀 **✅ 完美修正：** (提供該句的正確寫法)
---
(依此類推，列出所有需要修改的句子)

## 🏆 3. 完美修正版 (Polished Version)
(提供一篇結合上述修改，語氣更通順、用字更道地的完整重寫版本。請使用 > 區塊引用標記來呈現這篇文章)

## 📚 4. 錯誤文法大彙整 (Grammar Power-Up!)
(從學生的錯誤中，挑選 2-3 個核心文法觀念進行特訓，嚴格使用以下格式)：
### 🎯 重點一：(文法重點名稱)
* **規則：** (解釋文法規則)
* **❌ 錯誤寫法：** (舉例)
* **⭕ 正確寫法：** (舉例)
* **📝 例句：** (造一個正確的英文例句與中文翻譯)

## 🔠 5. 錯誤單字大彙整 (Vocabulary Booster!)
(挑選學生用錯或可以用得更好的單字，製作成 Markdown 表格，表格需包含以下欄位：)
| 單字/片語 | 詞性 | 你的用法 (需微調) | 💡 老師的精準用法教學 |
| :--- | :--- | :--- | :--- |
| (單字) | (詞性) | (學生原句節錄) | (解釋與正確例句) |`;

            const userMessage = `題目提示：\n${questionPrompt}\n\n學生作答：\n${userAnswer}`;

            const activeKey = localStorage.getItem('gemini_api_key') || apiKey;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: userMessage }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    temperature: 0.3
                }
            };

            let retries = 5;
            let delay = 1000;
            
            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`API HTTP Error: ${response.status}`);
                    
                    const result = await response.json();
                    let textResult = result.candidates[0].content.parts[0].text;
                    return textResult;

                } catch (e) {
                    retries--;
                    if (retries === 0) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function renderFeedback(markdownData) {
            const contentContainer = document.getElementById('fb-content');
            
            if (!markdownData) {
                contentContainer.innerHTML = `<div class="p-6 bg-red-50 text-red-700 rounded-xl text-lg font-bold"><i class="fas fa-exclamation-triangle mr-2"></i> 批改報告讀取失敗，請重新提交。</div>`;
                return;
            }

            contentContainer.innerHTML = marked.parse(markdownData);
        }

        window.addEventListener('DOMContentLoaded', () => {
            initFirebase();
            updateWordCount();
        });

    </script>
</body>
</html>
