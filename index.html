<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEPT 中級寫作模擬平台</title>
    <!-- Tailwind CSS (加入 typography 插件以完美渲染 Markdown) -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Marked.js (用於解析 Markdown) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gept: {
                            light: '#FFF7ED', // orange-50
                            base: '#FFEDD5',  // orange-100
                            primary: '#F97316', // orange-500
                            dark: '#C2410C',  // orange-700
                            text: '#431407'   // orange-950
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #FFF7ED; color: #431407; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.875rem; }
        .day-header { font-weight: bold; color: #C2410C; text-align: center; padding: 4px; }
        .day-empty { background-color: transparent; }
        .day-normal { background-color: #FFEDD5; color: #431407; }
        .day-completed { background-color: #F97316; color: white; font-weight: bold; position: relative; box-shadow: 0 2px 4px rgba(249, 115, 22, 0.3); }
        .day-completed::after { content: '★'; position: absolute; top: 2px; right: 2px; font-size: 0.6rem; color: #FEF08A; }
        
        .loader { border: 4px solid #FFEDD5; border-top: 4px solid #F97316; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #FFEDD5; }
        ::-webkit-scrollbar-thumb { background: #FDBA74; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #F97316; }

        /* 微調 Markdown 表格樣式 */
        .prose table { width: 100%; border-collapse: collapse; }
        .prose th { background-color: #FFEDD5; color: #C2410C; padding: 12px; text-align: left; border-bottom: 2px solid #FDBA74; }
        .prose td { padding: 12px; border-bottom: 1px solid #FFEDD5; }
        .prose blockquote { border-left-color: #F97316; background-color: #FFF7ED; padding: 1rem; border-radius: 0 8px 8px 0; font-style: normal;}
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fas fa-pen-nib text-gept-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-gept-text cursor-pointer" onclick="appState.showView('dashboard')">GEPT 寫作模擬平台</h1>
            </div>
            <div class="flex items-center gap-4">
                <div id="connection-status" class="flex items-center gap-2 text-sm">
                    <div class="w-3 h-3 rounded-full bg-gray-400" id="status-light"></div>
                    <span id="status-text" class="text-gray-600 hidden sm:inline">初始化中...</span>
                </div>
                <div id="header-user" class="hidden items-center gap-2 font-medium text-gept-dark bg-gept-base px-3 py-1 rounded-full">
                    <i class="fas fa-user-circle text-lg"></i>
                    <span id="header-username"></span>
                    <button onclick="logout()" class="ml-2 text-xs text-red-500 hover:text-red-700" title="登出"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-6xl mx-auto w-full px-4 py-8 relative">

        <!-- 1. Login View -->
        <div id="login-view" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg border border-orange-100 view-section">
            <h2 class="text-2xl font-bold text-center text-gept-dark mb-6">歡迎使用寫作平台</h2>
            
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">請輸入您的姓名登入：</label>
                <div class="flex gap-2">
                    <input type="text" id="login-name" class="flex-grow px-4 py-2 rounded-lg border border-orange-200 focus:outline-none focus:ring-2 focus:ring-gept-primary bg-gept-light" placeholder="例如：王小明">
                    <button onclick="handleLogin()" class="bg-gept-primary text-white px-6 py-2 rounded-lg hover:bg-gept-dark transition-colors shadow-md font-medium">登入</button>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Gemini API 金鑰 (批改時需要)：</label>
                <input type="password" id="login-apikey" class="w-full px-4 py-2 rounded-lg border border-orange-200 focus:outline-none focus:ring-2 focus:ring-gept-primary bg-gept-light text-sm" placeholder="AIzaSy...">
                <p class="text-xs text-gray-500 mt-1"><i class="fas fa-shield-alt text-green-600"></i> 金鑰將安全地儲存於瀏覽器 LocalStorage，不會回傳至我們的伺服器。</p>
            </div>

            <div class="border-t border-orange-100 pt-6">
                <h3 class="text-sm font-medium text-gray-500 mb-4 flex items-center gap-2">
                    <i class="fas fa-bolt text-yellow-500"></i> 快速登入 (點擊頭像)
                </h3>
                <div id="quick-login-list" class="flex flex-wrap gap-3">
                    <div class="text-sm text-gray-400 italic">載入中...</div>
                </div>
            </div>
        </div>

        <!-- 2. Dashboard View (Calendar & Question List) -->
        <div id="dashboard-view" class="hidden view-section space-y-6">
            <div class="flex flex-col md:flex-row gap-6">
                <!-- Left: Calendar Profile -->
                <div class="w-full md:w-1/3 bg-white p-6 rounded-2xl shadow-md border border-orange-100">
                    <div class="text-center mb-6">
                        <div class="w-20 h-20 bg-gept-base rounded-full mx-auto flex items-center justify-center text-gept-primary text-3xl mb-3 shadow-inner">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <h2 class="text-xl font-bold" id="dashboard-username">使用者</h2>
                        <p class="text-sm text-gray-500 mt-1">你的專屬寫作練習區</p>
                    </div>
                    
                    <div class="border-t border-orange-100 pt-4">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-gept-dark"><i class="far fa-calendar-check mr-2"></i>學習日曆</h3>
                            <span id="calendar-month-year" class="text-sm font-medium bg-orange-100 px-2 py-1 rounded text-orange-800"></span>
                        </div>
                        <div class="calendar-grid mb-2">
                            <div class="day-header">日</div><div class="day-header">一</div><div class="day-header">二</div><div class="day-header">三</div><div class="day-header">四</div><div class="day-header">五</div><div class="day-header">六</div>
                        </div>
                        <div id="calendar-body" class="calendar-grid">
                            <!-- Calendar generated by JS -->
                        </div>
                        <div class="mt-4 text-xs text-gray-500 flex items-center justify-center gap-2">
                            <span class="w-3 h-3 inline-block bg-gept-primary rounded-sm shadow-sm"></span> 表示當日有完成練習
                        </div>
                    </div>
                </div>

                <!-- Right: Question List -->
                <div class="w-full md:w-2/3 bg-white p-6 rounded-2xl shadow-md border border-orange-100">
                    <h2 class="text-xl font-bold mb-4 text-gept-dark border-b-2 border-orange-200 pb-2 flex justify-between">
                        <span><i class="fas fa-list-ul mr-2"></i>模擬試題列表</span>
                        <span class="text-sm font-normal text-gray-500 mt-1">共 10 題</span>
                    </h2>
                    <div id="question-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                        <!-- Questions generated by JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. Test Interface View -->
        <div id="test-view" class="hidden view-section max-w-4xl mx-auto space-y-4">
            <button onclick="appState.showView('dashboard')" class="text-gept-dark hover:text-gept-primary mb-2 inline-flex items-center gap-1 font-medium transition-colors">
                <i class="fas fa-arrow-left"></i> 返回列表
            </button>
            
            <!-- Question Area -->
            <div class="bg-white p-6 rounded-2xl shadow-md border border-orange-200">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="q-title" class="text-xl font-bold text-gray-800"></h2>
                    <span id="q-type" class="bg-orange-100 text-orange-800 text-xs px-3 py-1 rounded-full font-medium border border-orange-200"></span>
                </div>
                <div class="bg-orange-50 p-4 rounded-lg border border-orange-100 mb-4">
                    <h3 class="font-bold text-gept-dark mb-2"><i class="fas fa-info-circle mr-1"></i>說明：</h3>
                    <p id="q-instructions" class="text-gray-700 text-sm leading-relaxed mb-4"></p>
                    <h3 class="font-bold text-gept-dark mb-2"><i class="fas fa-comment-dots mr-1"></i>提示：</h3>
                    <p id="q-prompt" class="text-gray-800 whitespace-pre-wrap leading-relaxed"></p>
                </div>
                
                <button onclick="toggleSample()" class="text-sm text-gept-primary hover:text-gept-dark flex items-center gap-1 font-medium">
                    <i id="sample-icon" class="fas fa-chevron-down"></i> <span id="sample-text">顯示範例文章</span>
                </button>
                <div id="q-sample" class="hidden mt-3 p-4 bg-gray-50 rounded-lg border border-gray-200 text-gray-700 whitespace-pre-wrap text-sm leading-relaxed shadow-inner"></div>
            </div>

            <!-- Answer Area -->
            <div class="bg-white p-6 rounded-2xl shadow-md border border-orange-200">
                <div class="flex justify-between items-end mb-3">
                    <h3 class="font-bold text-lg text-gray-800"><i class="fas fa-pencil-alt mr-2 text-gept-primary"></i>您的作答</h3>
                    <span id="word-count" class="text-sm text-gray-500 bg-gray-100 px-2 py-1 rounded">字數: 0</span>
                </div>
                <textarea id="user-answer" class="w-full h-48 p-4 rounded-lg border-2 border-orange-200 focus:border-gept-primary focus:ring-0 resize-y bg-gept-light transition-colors text-lg leading-relaxed" placeholder="請在此輸入您的英文作文..."></textarea>
                
                <div class="mt-4 flex justify-between items-center">
                    <div id="last-saved" class="text-sm text-gray-500 italic"></div>
                    <button id="submit-btn" onclick="submitAnswer()" class="bg-gept-primary text-white px-8 py-3 rounded-xl hover:bg-orange-600 transition-colors shadow-lg font-bold flex items-center gap-2 transform hover:-translate-y-0.5">
                        <i class="fas fa-paper-plane"></i> 提交給 AI 老師批改
                    </button>
                </div>
            </div>
            
            <!-- Loading Overlay for AI -->
            <div id="ai-loading" class="hidden bg-white/90 absolute inset-0 z-10 flex flex-col items-center justify-center rounded-2xl backdrop-blur-sm">
                <div class="loader mb-4"></div>
                <p class="text-gept-dark font-bold text-lg animate-pulse">AI 老師正在認真批改中...</p>
                <p class="text-sm text-gray-500 mt-2">這會是一份非常詳細的報告，請稍候幾秒鐘...</p>
            </div>
        </div>

        <!-- 4. Feedback View -->
        <div id="feedback-view" class="hidden view-section max-w-5xl mx-auto space-y-6">
            <!-- Header -->
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-orange-100 sticky top-16 z-40">
                <h2 class="text-2xl font-bold text-gept-dark flex items-center gap-2">
                    <i class="fas fa-robot text-orange-500 text-3xl"></i> AI 老師批改報告
                </h2>
                <div class="flex gap-3">
                    <button onclick="appState.showView('test')" class="px-4 py-2 bg-gept-primary text-white rounded-lg hover:bg-orange-600 font-medium transition-colors shadow-sm">
                        <i class="fas fa-undo mr-1"></i> 回到編輯區修改
                    </button>
                    <button onclick="appState.showView('dashboard')" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition-colors">
                        回列表
                    </button>
                </div>
            </div>

            <!-- Markdown 解析後將放入此容器。加上 prose 類別讓 Tailwind Typography 接手排版 -->
            <div id="feedback-content" class="bg-white p-8 rounded-2xl shadow-lg border-t-4 border-gept-primary prose prose-orange prose-lg max-w-none text-gray-800">
                <!-- Content generated by Marked.js -->
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script type="module">
        // --- 1. Question Data (Mock GEPT Intermediate) ---
        const questionsData = [
            {
                id: "q1",
                type: "Guided Writing (引導寫作)",
                title: "例題 I - 父母的獎勵",
                instructions: "請依下面所提供的文字提示寫一篇英文作文，長度約 120 字（8 至 12 個句子）。作文可以是一個完整的段落，也可以分段。（評分重點包括內容、組織、文法、用字遣詞、標點符號、大小寫。）",
                prompt: "一般來說，孩子表現良好時，父母常會給孩子獎勵。請寫一篇文章說明：\n(1) 你表現好的時候，你的父母通常會用哪些方法獎勵你？你覺得這些方法有效、適當嗎？\n(2) 如果有一天你為人父母，你會用相同的獎勵方式嗎？",
                sample: "When I perform well, my parents usually reward me with encouraging words and sometimes a special meal at my favorite restaurant. I find these methods both effective and appropriate because they make me feel valued without spoiling me with expensive gifts. The verbal praise boosts my confidence, while the special meal serves as a memorable celebration.\n\nIf I become a parent someday, I will likely use similar rewarding methods. I believe that emotional support and shared experiences are more precious than material items. However, I might also incorporate a system where my children can earn extra free time for their hobbies, encouraging them to pursue their interests."
            },
            {
                id: "q2",
                type: "Email (信函寫作)",
                title: "例題 II - 給轉學筆友的建議",
                instructions: "請依以下提示寫一封英文 email，長度約 120 字（8 至 12 個句子）。此信可以是一個完整的段落，也可以分段。（Email 的上下款不須寫在答案紙上。）",
                prompt: "你住在美國的筆友 Ted 最近剛轉學，正在煩惱新學校的交友問題。請寫一封英文 email 給他，信的內容必須包括以下兩點：\n(1) 分享你適應新環境的經驗。\n(2) 建議他幾個交新朋友的方法。",
                sample: "I was sorry to hear that you are struggling to make friends at your new school. I know exactly how you feel, as I experienced the same anxiety when I transferred to my current high school two years ago. Initially, I felt lonely, but I gradually adapted by giving myself time and keeping an open mind.\n\nTo make new friends, I suggest you join some school clubs that match your interests, like the basketball team or the photography club. This is a great way to meet people who share similar hobbies. Additionally, don't be afraid to strike up a conversation with your classmates during breaks. A simple smile and a friendly \"hello\" can go a long way. Hang in there, and things will get better soon!"
            },
            {
                id: "q3",
                type: "Guided Writing (引導寫作)",
                title: "智慧型手機的影響",
                instructions: "字數約 120 字。可以分段。",
                prompt: "智慧型手機為現代人帶來便利，但也衍生出一些問題。請寫一篇文章：\n(1) 說明智慧型手機為你的生活帶來的優點與缺點。\n(2) 你認為應該如何健康地使用智慧型手機？",
                sample: "Smartphones have brought both significant benefits and drawbacks to my life. On the positive side, they provide immense convenience. I can easily keep in touch with friends, search for information instantly, and use various apps to manage my schedule. However, the downside is that I sometimes become too distracted by social media, which affects my concentration on studies and leads to eye strain.\n\nTo use smartphones healthily, I believe we should set clear boundaries. For instance, we can turn off unnecessary notifications while studying and avoid using screens an hour before bedtime. By practicing self-discipline, we can enjoy the convenience of technology without letting it control our lives."
            },
            {
                id: "q4",
                type: "Email (信函寫作)",
                title: "取消約會與道歉",
                instructions: "字數約 120 字。上下款不計。",
                prompt: "你原本和外國朋友 Sarah 約好這週末一起去參觀博物館，但你因為生病無法前往。請寫一封 email：\n(1) 解釋你無法赴約的原因並表達歉意。\n(2) 提議下週或未來的另一個時間重新安排行程。",
                sample: "I am writing to sincerely apologize for having to cancel our plans to visit the museum this weekend. Unfortunately, I have caught a severe cold and my doctor has advised me to stay home and rest. I was really looking forward to our trip and I feel terrible for letting you down at the last minute.\n\nWould it be possible to reschedule our visit for next Saturday? I should be fully recovered by then. If next weekend doesn't work for you, please let me know when you are available. Once again, I am so sorry for the inconvenience, and I hope we can meet up soon."
            },
            {
                id: "q5",
                type: "Guided Writing (引導寫作)",
                title: "網路購物 vs 實體店面",
                instructions: "字數約 120 字。",
                prompt: "現代人購物的管道多元。請寫一篇文章比較：\n(1) 你比較喜歡網路購物還是去實體店面購物？為什麼？\n(2) 描述一次讓你印象深刻的購物經驗（好或壞皆可）。",
                sample: "I generally prefer online shopping to visiting physical stores. The primary reason is the incredible convenience it offers; I can browse products, compare prices, and read reviews at any time without leaving my room. Furthermore, online platforms often provide a wider variety of items than local shops.\n\nA memorable experience I had was when I ordered a winter coat online last year. The delivery was remarkably fast, and the coat fit perfectly. However, the best part was that the seller included a handwritten thank-you note and a small pair of gloves as a gift. This unexpected personal touch made the online shopping experience surprisingly warm and delightful."
            },
            {
                id: "q6",
                type: "Email (信函寫作)",
                title: "邀請外國朋友來台灣",
                instructions: "字數約 120 字。",
                prompt: "你的外國朋友 John 計畫來亞洲旅遊。請寫一封信邀請他來台灣：\n(1) 推薦一個台灣的特色景點並說明原因。\n(2) 介紹一項他一定要品嚐的台灣美食。",
                sample: "I heard you are planning a trip to Asia, and I would love to invite you to visit Taiwan! It is a beautiful island with friendly people and amazing sights.\n\nIf you come, I highly recommend visiting Taroko Gorge in Hualien. The marble canyons are absolutely breathtaking, and walking along the trails offers an unforgettable natural experience. Besides the scenery, you must try our famous beef noodle soup. The rich, savory broth combined with tender beef and chewy noodles is a true masterpiece of Taiwanese cuisine. I would be thrilled to be your tour guide. Let me know if you decide to come!"
            },
            {
                id: "q7",
                type: "Guided Writing (引導寫作)",
                title: "日常生活中的環保",
                instructions: "字數約 120 字。",
                prompt: "環境保護是全球關注的議題。請寫一篇文章說明：\n(1) 在日常生活中，你做了哪些具體的環保行動？\n(2) 你認為每個人微小的環保舉動能帶來什麼改變？",
                sample: "Environmental protection is a crucial issue, and I try to do my part in daily life. Specifically, I always carry a reusable water bottle and canvas shopping bags to reduce plastic waste. Additionally, I make it a habit to turn off lights and unplug appliances when they are not in use to conserve energy.\n\nI firmly believe that even minor eco-friendly actions can lead to significant changes. When millions of people adopt these small habits, the cumulative effect can massively reduce global carbon emissions and pollution. Ultimately, protecting the earth starts with individual responsibility, and every little effort counts towards a sustainable future."
            },
            {
                id: "q8",
                type: "Email (信函寫作)",
                title: "向飯店尋找遺失物",
                instructions: "字數約 120 字。",
                prompt: "你上週在國外旅遊時入住一間飯店，退房回國後發現把一件重要的外套忘在房間了。請寫信給飯店：\n(1) 描述該外套的特徵以及你住的房號與日期。\n(2) 詢問他們是否尋獲，並說明你願意支付寄回的運費。",
                sample: "I am writing to inquire about an item I believe I left behind during my recent stay at your hotel. I checked out on May 15th from room 302.\n\nI am missing a dark blue, waterproof jacket with a silver zipper. It is very important to me as it was a birthday gift. Could you please check with your housekeeping department to see if it was found in the room or the closet? If it has been located, I would be extremely grateful if you could arrange to have it shipped to my home address in Taiwan. I will, of course, cover all the shipping expenses. Thank you for your assistance."
            },
            {
                id: "q9",
                type: "Guided Writing (引導寫作)",
                title: "學習第二外語的重要性",
                instructions: "字數約 120 字。",
                prompt: "除了英文，越來越多人學習第二外語（如日文、韓文、法文等）。請說明：\n(1) 你有學習第二外語的經驗或計畫嗎？為什麼選擇該語言？\n(2) 學習多種語言對未來的職涯或生活有什麼幫助？",
                sample: "Besides English, I have been planning to learn Japanese as my second foreign language. I chose Japanese because I am deeply fascinated by Japanese culture, especially their animation and traditional arts. Furthermore, traveling to Japan is one of my biggest dreams, and knowing the language would make the trip much more enjoyable.\n\nI believe that mastering multiple languages is highly beneficial for both career and life. In the workplace, being multilingual makes you a more competitive candidate in the global market, opening doors to international companies. In life, it allows you to connect with people from diverse backgrounds and understand different cultures from a broader perspective."
            },
            {
                id: "q10",
                type: "Email (信函寫作)",
                title: "感謝寄宿家庭",
                instructions: "字數約 120 字。",

        const firebaseConfig = {

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gept-writing-mock-v1';

        // --- Init & UI Functions ---
        function updateConnectionStatus(status, text) {
            const light = document.getElementById('status-light');
            const txt = document.getElementById('status-text');
            txt.textContent = text;
            light.className = 'w-3 h-3 rounded-full ' + 
                (status === 'loading' ? 'bg-yellow-400 animate-pulse' : 
                 status === 'success' ? 'bg-green-500' : 'bg-red-500');
        }

        async function initFirebase() {
            try {
                updateConnectionStatus('loading', '連線至資料庫...');
                const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
                app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                // Start Auth
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (authError) {
                    console.warn("Token 登入失敗，自動切換為匿名登入模式:", authError);
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUserUid = user.uid;
                        isFirebaseReady = true;
                        updateConnectionStatus('success', '系統就緒');
                        listenToGlobalUsers();
                    } else {
                        isFirebaseReady = false;
                    }
                });
            } catch (error) {
                console.error("Firebase Init Error:", error);
                updateConnectionStatus('error', '連線失敗');
            }
        }

        // --- Data Logic ---
        function listenToGlobalUsers() {
            if(!currentUserUid || !isFirebaseReady) return;
            const globalRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, DOC_GLOBAL);
            
            onSnapshot(globalRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.users && Array.isArray(data.users)) {
                        const names = data.users.map(u => typeof u === 'string' ? u : u.name).filter(Boolean);
                        const uniqueNames = [...new Set(names)].reverse();
                        renderQuickLogin(uniqueNames);
                    } else {
                        renderQuickLogin([]);
                    }
                } else {
                    renderQuickLogin([]);
                }
            }, (error) => {
                console.error("Listen global error:", error);
                updateConnectionStatus('error', '同步名單失敗');
            });
        }

        window.handleLogin = async (nameOverride) => {
            const nameInput = document.getElementById('login-name').value;
            const finalName = (nameOverride || nameInput).trim();
            if (!finalName) return alert("請輸入您的姓名");
            if (!isFirebaseReady) return alert("系統連線中，請稍候...");

            // 儲存 API Key 到 LocalStorage
            const apiKeyInput = document.getElementById('login-apikey').value.trim();
            if (apiKeyInput) {
                localStorage.setItem('gemini_api_key', apiKeyInput);
            }

            const loginBtn = document.querySelector('button[onclick="handleLogin()"]');
            const originalText = loginBtn.innerText;
            loginBtn.innerText = '登入中...';
            loginBtn.disabled = true;

            try {
                const globalRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, DOC_GLOBAL);
                const globalSnap = await getDoc(globalRef);
                let users = globalSnap.exists() ? globalSnap.data().users || [] : [];
                
                const stringUsers = users.map(u => typeof u === 'string' ? u : u.name).filter(Boolean);
                
                if (!stringUsers.includes(finalName)) {
                    stringUsers.push(finalName);
                    await setDoc(globalRef, { users: stringUsers }, { merge: true });
                }

                currentUserName = finalName;
                
                document.getElementById('header-user').classList.remove('hidden');
                document.getElementById('header-user').classList.add('flex');
                document.getElementById('header-username').textContent = finalName;
                document.getElementById('dashboard-username').textContent = finalName;

                subscribeToUserData(finalName);
                appState.showView('dashboard');
                
            } catch (e) {
                console.error("Login Error:", e);
                alert("登入失敗，請檢查網路連線後重試。");
            } finally {
                loginBtn.innerText = originalText;
                loginBtn.disabled = false;
            }
        };

        function subscribeToUserData(userName) {
            if (unsubscribeUser) unsubscribeUser();
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, `user_${userName}`);
            
            unsubscribeUser = onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userProfileData = docSnap.data();
                    if(!userProfileData.completedDates) userProfileData.completedDates = [];
                    if(!userProfileData.history) userProfileData.history = {};
                } else {
                    userProfileData = { history: {}, completedDates: [] };
                    setDoc(userRef, userProfileData);
                }
                
                if(appState.currentView === 'dashboard') renderDashboard();
                if(appState.currentView === 'test') renderTestArea(); // 讓 test 畫面也能同步字數或上次進度
                
            }, (err) => console.error("User data listen error", err));
        }

        window.logout = () => {
            currentUserName = null;
            userProfileData = { history: {}, completedDates: [] };
            if(unsubscribeUser) unsubscribeUser();
            document.getElementById('header-user').classList.add('hidden');
            document.getElementById('header-user').classList.remove('flex');
            document.getElementById('login-name').value = '';
            appState.showView('login');
        };

        // --- UI Rendering ---
        function renderQuickLogin(users) {
            const container = document.getElementById('quick-login-list');
            if (users.length === 0) {
                container.innerHTML = '<span class="text-sm text-gray-400">尚無紀錄</span>';
                return;
            }
            container.innerHTML = users.map(u => `
                <button onclick="handleLogin('${u}')" class="bg-orange-100 text-gept-dark px-3 py-1.5 rounded-full text-sm font-medium hover:bg-orange-200 transition border border-orange-200 shadow-sm flex items-center gap-1">
                    <i class="fas fa-user text-xs"></i> ${u}
                </button>
            `).join('');
        }

        function renderDashboard() {
            renderCalendar();
            
            const qList = document.getElementById('question-list');
            qList.innerHTML = questionsData.map((q, index) => {
                const hasCompleted = userProfileData.history[q.id] && userProfileData.history[q.id].feedback;
                const statusIcon = hasCompleted 
                    ? `<i class="fas fa-check-circle text-green-500" title="已完成"></i>` 
                    : `<i class="far fa-circle text-gray-300" title="未完成"></i>`;
                
                return `
                <div class="flex items-center justify-between p-4 bg-orange-50 rounded-xl border border-orange-100 hover:shadow-md transition-shadow cursor-pointer" onclick="selectQuestion('${q.id}')">

                        <i class="fas fa-pen"></i>
                    </button>
                </div>
                `;
            }).join('');
        }

        function renderCalendar() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            
            document.getElementById('calendar-month-year').textContent = `${year}年 ${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const calendarBody = document.getElementById('calendar-body');
            let html = '';
            
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="calendar-day day-empty"></div>`;
            }
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isCompleted = userProfileData.completedDates && userProfileData.completedDates.includes(dateString);
                const className = isCompleted ? 'calendar-day day-completed' : 'calendar-day day-normal';
                
                html += `<div class="${className}">${i}</div>`;
            }
            
            calendarBody.innerHTML = html;
        }

        window.selectQuestion = (qId) => {
            appState.selectedQuestionId = qId;
            appState.showView('test');
        };

        function renderTestArea() {
            const q = questionsData.find(x => x.id === appState.selectedQuestionId);
            if(!q) return;

            document.getElementById('q-title').textContent = q.title;
            document.getElementById('q-type').textContent = q.type;
            document.getElementById('q-instructions').textContent = q.instructions;
            document.getElementById('q-prompt').textContent = q.prompt;
            document.getElementById('q-sample').textContent = q.sample;
            
            document.getElementById('q-sample').classList.add('hidden');
            document.getElementById('sample-text').textContent = '顯示範例文章';
            document.getElementById('sample-icon').className = 'fas fa-chevron-down';
            
            const textarea = document.getElementById('user-answer');
            const savedData = userProfileData.history[q.id];
            
            // 避免使用者正在輸入時被 Firebase 更新覆蓋
            if (document.activeElement !== textarea) {
                if (savedData && savedData.draft) {
                    textarea.value = savedData.draft;
                    document.getElementById('last-saved').textContent = `上次作答時間: ${savedData.lastUpdate}`;

                    textarea.value = '';
                    document.getElementById('last-saved').textContent = '';

                updateWordCount();
            }
        }

        window.toggleSample = () => {
            const sampleDiv = document.getElementById('q-sample');

            if (isHidden) {
                sampleDiv.classList.remove('hidden');

                document.getElementById('sample-icon').className = 'fas fa-chevron-down';
            }
        };

        document.getElementById('user-answer').addEventListener('input', updateWordCount);
        function updateWordCount() {
            const text = document.getElementById('user-answer').value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            document.getElementById('word-count').textContent = `字數: ${words}`;
        }

        // --- Submit & API Logic ---
        window.submitAnswer = async () => {
            const answer = document.getElementById('user-answer').value.trim();
            if (answer.split(/\s+/).length < 20) {
                alert("作答內容太少，請至少輸入 20 個字以上再提交批改！");
                return;
            }

            const q = questionsData.find(x => x.id === appState.selectedQuestionId);
            
            document.getElementById('ai-loading').classList.remove('hidden');
            
            try {
                // 1. 先儲存目前的草稿
                await saveProgress(answer, null);
                
                // 2. 呼叫 Gemini 取得 Markdown 回應
                const feedbackMarkdown = await callGeminiAPI(q.prompt, answer);
                
                // 3. 處理並顯示 Feedback

                // 4. 將 Markdown 儲存至資料庫

                document.getElementById('ai-loading').classList.add('hidden');

        async function saveProgress(draft, feedback) {
            if(!currentUserName) return;
            
            const qId = appState.selectedQuestionId;
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const timeStr = now.toLocaleString('zh-TW');

            let newHistory = { ...userProfileData.history };
            newHistory[qId] = {
                draft: draft,
                lastUpdate: timeStr,
                feedback: feedback || (newHistory[qId] ? newHistory[qId].feedback : null)
            };

            let newDates = [...(userProfileData.completedDates || [])];
            if (feedback && !newDates.includes(dateStr)) {
                newDates.push(dateStr);
            }

            const userRef = doc(db, 'artifacts', appId, 'public', 'data', COLLECTION_NAME, `user_${currentUserName}`);
            await setDoc(userRef, {
                history: newHistory,
                completedDates: newDates
            }, { merge: true });
        }

        async function callGeminiAPI(questionPrompt, userAnswer) {
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) {
                throw new Error("找不到 Gemini API Key！\n請先登出並在登入畫面設定您的 API Key。");

            // === 套用全新的 Markdown 提示詞 ===
            const systemPrompt = `你是一位專業、親切且充滿熱忱的英文寫作老師。你的目標是幫助學生找出英文作文中的盲點，並提供最詳細、易懂、且視覺排版豐富的解析報告。

請務必使用「繁體中文」進行解說，並嚴格遵循以下的 Markdown 輸出格式與架構，不可遺漏任何一個單元。為了確保在各種 App 介面上的相容性，請不要使用 HTML 標籤，請完全依賴 Markdown 與 Emoji 來做視覺區分。

### 輸出格式規定：

# 📝 英文寫作專屬指導報告
Hello! 我是你的專屬英文老師 👩‍🏫。針對你這次的寫作，我做了非常詳細的分析。接下來，我們一起來看看如何讓這篇文章變得更完美吧！✨

## 🌟 1. 教師總評語 (Overall Feedback)
### 👍 你的優點 (Strengths):
(列出 2-3 點學生寫得好的地方，例如切題度、語氣、連接詞使用等)

(列出 2-3 點需要改進的整體問題，例如時態、代名詞、邏輯等)

(請將學生有錯誤的句子挑出來，並嚴格使用以下 Emoji 條列式格式呈現，不可使用表格)：

---
(依此類推，列出所有需要修改的句子)

(從學生的錯誤中，挑選 2-3 個核心文法觀念進行特訓，嚴格使用以下格式)：

## 🔠 5. 錯誤單字大彙整 (Vocabulary Booster!)
(挑選學生用錯或可以用得更好的單字，製作成 Markdown 表格，表格需包含以下欄位：)
| 單字/片語 | 詞性 | 你的用法 (需微調) | 💡 老師的精準用法教學 |
| :--- | :--- | :--- | :--- |
| (單字) | (詞性) | (學生原句節錄) | (解釋與正確例句) |`;

            const userMessage = `題目提示：\n${questionPrompt}\n\n學生作答：\n${userAnswer}`;

            // 將模型更改為相容性更高的 gemini-1.5-flash-latest
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: userMessage }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    temperature: 0.3 // 讓老師的語氣保持專業但稍微自然
                }
            };

            let retries = 5;
            let delay = 1000;
            
            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        const detail = errData.error?.message || response.statusText;
                        let errorMsg = `API HTTP Error: ${response.status}\n詳細原因: ${detail}`;
                        
                        // 若遇到 404，給予貼心的替換模型提示
                        if (response.status === 404) {
                            errorMsg += "\n\n💡 提示：您的 API 專案可能尚未開通此模型。請打開程式碼，搜尋 url，將 'gemini-1.5-flash-latest' 更改為最基礎的 'gemini-pro' 試試看！";
                        }

                        // 若為 400、403、404 等客戶端錯誤，不進行重試直接拋出
                        if (response.status >= 400 && response.status < 500 && response.status !== 429) {
                            let fatalErr = new Error(errorMsg);
                            fatalErr.isFatal = true;
                            throw fatalErr;
                        }
                        throw new Error(errorMsg);
                    }
                    
                    const result = await response.json();
                    let textResult = result.candidates[0].content.parts[0].text;
                    
                    // 直接回傳 Markdown 字串
                    return textResult;

                } catch (e) {
                    if (e.isFatal) throw e;
                    retries--;
                    if (retries === 0) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function renderFeedback(data) {
            const container = document.getElementById('feedback-content');
            
            if (!data) {
                container.innerHTML = `<p>無法獲取解析資料，請稍後再試。</p>`;
                return;
            }

            // 為了向後相容舊版的 JSON 格式歷史紀錄
            if (typeof data === 'object' && data.overall) {
                container.innerHTML = `
                    <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4">
                        <p class="text-yellow-700">⚠️ 這是舊版的批改紀錄格式，無法在新的 Markdown 介面完整顯示。建議您使用新的批改功能重新提交！</p>
                    </div>
                    <h3>舊版總評語：</h3>
                    <p>${data.overall}</p>
                `;
                return;
            }

            // 使用 marked.js 將 Markdown 轉換為 HTML 並放入容器
            if (typeof marked !== 'undefined') {
                container.innerHTML = marked.parse(data);
            } else {
                container.innerHTML = `<pre class="whitespace-pre-wrap">${data}</pre>`;
            }
        }

        // Init App
        window.addEventListener('DOMContentLoaded', () => {
            // 讀取儲存的 API Key
            const savedApiKey = localStorage.getItem('gemini_api_key');
            if (savedApiKey) {
                document.getElementById('login-apikey').value = savedApiKey;
            }

            initFirebase();
            updateWordCount();
        });

    </script>
