<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEPT 中級寫作模擬訓練平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            background-color: #fffbeb; /* warm-50 */
        }
        .instruction-text {
            line-height: 1.8;
        }
        /* Custom Scrollbar for a polished look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fef3c7; 
        }
        ::-webkit-scrollbar-thumb {
            background: #fcd34d; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #fbbf24; 
        }
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            40% { color: inherit; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .25em 0 0 inherit, .5em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .25em 0 0 inherit, .5em 0 0 inherit; }
        }
    </style>
</head>
<body class="text-warm-900 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-warm-600 text-white shadow-md py-4 px-6 md:px-12 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <i class="fas fa-pen-fancy text-2xl"></i>
            <h1 class="text-xl md:text-2xl font-bold tracking-wider">GEPT 中級寫作模擬訓練</h1>
        </div>
        <div class="text-sm bg-warm-700 px-3 py-1 rounded-full border border-warm-500">
            <i class="fas fa-graduation-cap mr-1"></i> 專業培訓版
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col md:flex-row max-w-7xl mx-auto w-full p-4 md:p-6 gap-6">
        
        <!-- Sidebar / Question Selector -->
        <aside class="w-full md:w-1/4 bg-white rounded-xl shadow-sm border border-warm-200 p-4 h-fit">
            <h2 class="text-lg font-bold text-warm-800 mb-4 pb-2 border-b border-warm-200">
                <i class="fas fa-list-ul mr-2"></i>選擇試題
            </h2>
            <div id="question-list" class="flex flex-col gap-2">
                <!-- Question buttons will be generated here -->
            </div>
            <div class="mt-8 p-4 bg-warm-50 rounded-lg border border-warm-100 text-sm text-warm-700">
                <h3 class="font-bold mb-2"><i class="fas fa-info-circle mr-1"></i>測驗提示</h3>
                <ul class="list-disc pl-4 space-y-1">
                    <li>長度約 120 字 (8至12個句子)。</li>
                    <li>評分重點：內容、組織、文法、用字遣詞、標點符號、大小寫。</li>
                </ul>
            </div>
        </aside>

        <!-- Editor Area -->
        <section class="w-full md:w-3/4 flex flex-col gap-6">
            
            <!-- Question Display -->
            <div class="bg-white rounded-xl shadow-sm border border-warm-200 p-6 md:p-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="question-title" class="text-xl md:text-2xl font-bold text-warm-800">例題 I</h2>
                    <span id="question-type-badge" class="bg-warm-100 text-warm-700 px-3 py-1 rounded-full text-sm font-semibold border border-warm-300">一般寫作</span>
                </div>
                
                <div class="instruction-text mb-6">
                    <p class="font-bold mb-2">說明：</p>
                    <p id="question-instruction" class="text-gray-700 text-justify"></p>
                </div>

                <div class="instruction-text bg-warm-50 p-5 rounded-lg border-l-4 border-warm-500">
                    <p class="font-bold mb-2 text-warm-800">提示：</p>
                    <div id="question-prompt" class="text-gray-800 text-lg"></div>
                </div>
            </div>

            <!-- Writing Area -->
            <div class="bg-white rounded-xl shadow-sm border border-warm-200 p-6 md:p-8 flex flex-col">
                <div class="flex justify-between items-end mb-2">
                    <label for="user-essay" class="font-bold text-warm-800 text-lg">
                        <i class="fas fa-keyboard mr-2"></i>作答區
                    </label>
                    <span class="text-sm font-semibold text-gray-500 bg-gray-100 px-2 py-1 rounded">
                        字數：<span id="word-count" class="text-warm-600 font-bold">0</span> / ~120
                    </span>
                </div>
                
                <textarea id="user-essay" rows="10" 
                    class="w-full p-4 border border-warm-300 rounded-lg focus:ring-2 focus:ring-warm-500 focus:border-warm-500 outline-none resize-y text-lg text-gray-800 leading-relaxed transition-shadow"
                    placeholder="請在此輸入您的英文作文..."></textarea>
                
                <div class="flex flex-wrap items-center justify-between mt-4 gap-4">
                    <button id="toggle-sample-btn" onclick="toggleSample()" class="px-4 py-2 text-warm-700 bg-warm-100 hover:bg-warm-200 font-semibold rounded-lg transition-colors flex items-center gap-2 border border-warm-300">
                        <i class="fas fa-eye"></i> <span>顯示範例文章</span>
                    </button>
                    
                    <button id="submit-btn" onclick="submitForEvaluation()" class="px-6 py-3 bg-warm-600 hover:bg-warm-700 text-white font-bold rounded-lg shadow-md hover:shadow-lg transition-all flex items-center gap-2 transform hover:-translate-y-0.5">
                        <i class="fas fa-paper-plane"></i> 提交 AI 批改
                    </button>
                </div>
            </div>

            <!-- Sample Essay Area (Hidden by default) -->
            <div id="sample-area" class="hidden bg-emerald-50 rounded-xl shadow-sm border border-emerald-200 p-6 md:p-8 transition-all">
                <div class="flex flex-wrap gap-3 justify-between items-center border-b border-emerald-200 pb-3 mb-4">
                    <h3 class="text-lg font-bold text-emerald-800">
                        <i class="fas fa-book-open mr-2"></i>範例文章 (Reference Model)
                    </h3>
                    <button id="play-tts-btn" onclick="toggleSampleAudio()" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition-colors flex items-center gap-2 text-sm font-semibold shadow-sm disabled:opacity-50">
                        <i id="tts-icon" class="fas fa-volume-up"></i> <span id="tts-text">真人語音朗讀</span>
                    </button>
                </div>
                
                <div class="mb-5">
                    <span class="text-xs font-bold bg-emerald-200 text-emerald-800 px-2 py-1 rounded mb-2 inline-block">English</span>
                    <p id="sample-text" class="text-gray-800 leading-relaxed text-lg whitespace-pre-wrap"></p>
                </div>

                <div class="pt-4 border-t border-emerald-200 mb-2">
                    <span class="text-xs font-bold bg-emerald-200 text-emerald-800 px-2 py-1 rounded mb-2 inline-block">中文語譯</span>
                    <p id="sample-translation" class="text-gray-700 leading-relaxed text-base whitespace-pre-wrap"></p>
                </div>
                
                <div class="mt-4 text-sm text-emerald-700 font-semibold text-right">
                    字數：<span id="sample-word-count"></span>
                </div>
            </div>

            <!-- Evaluation Feedback Area -->
            <div id="feedback-area" class="hidden bg-white rounded-xl shadow-sm border border-warm-300 overflow-hidden mb-8">
                <div class="bg-warm-600 text-white p-4 flex justify-between items-center">
                    <h3 class="text-lg font-bold"><i class="fas fa-check-double mr-2"></i>批改與評語</h3>
                    <button onclick="closeFeedback()" class="text-white hover:text-warm-200"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div id="feedback-loading" class="p-8 text-center text-warm-600 font-bold hidden flex-col items-center justify-center gap-4">
                    <i class="fas fa-robot text-4xl animate-bounce"></i>
                    <p class="text-lg">AI 老師正在用心批改您的文章，請稍候<span class="loading-dots"></span></p>
                </div>
                <div id="feedback-content" class="p-6 md:p-8 prose prose-warm max-w-none text-gray-800 leading-relaxed">
                    <!-- AI Feedback will be injected here -->
                </div>
            </div>

        </section>
    </main>

    <footer class="bg-warm-800 text-warm-200 text-center py-4 text-sm mt-auto">
        <p>GEPT 中級寫作模擬訓練平台 &copy; 2026. 僅供學習交流使用。</p>
    </footer>

    <script>
        // API Configuration
        const apiKey = ""; // The execution environment provides the key at runtime

        // Question Database
        const questions = [
            {
                id: 1,
                title: "模擬題 I",
                type: "一般寫作",
                instruction: "請依下面所提供的文字提示寫一篇英文作文，長度約 120 字（8 至 12 個句子）。作文可以是一個完整的段落，也可以分段。（評分重點包括內容、組織、文法、用字遣詞、標點符號、大小寫。）",
                prompt: "一般來說，孩子表現良好時，父母常會給孩子獎勵。請寫一篇文章說明<br><br>(1) 你表現好的時候，你的父母通常會用哪些方法獎勵你？你覺得這些方法有效、適當嗎？<br>(2) 如果有一天你為人父母，你會用相同的獎勵方式嗎？",
                sample: "Generally speaking, parents often reward their children for good behavior. When I perform well, my parents usually reward me by taking me out to a fancy restaurant for dinner or buying me books that I have wanted for a long time. I think these methods are both effective and appropriate because they make me feel appreciated and encourage me to keep up the good work without spoiling me with too much money.\n\nIf I become a parent one day, I will likely use similar rewarding methods. However, I would also add more non-material rewards, such as spending extra quality time together or praising them verbally. I believe that emotional support is just as important as physical gifts in building a child's confidence.",
                translation: "一般來說，父母常會因為孩子表現良好而給予獎勵。當我表現好時，我的父母通常會帶我去高級餐廳吃晚餐，或是買我渴望已久的書來獎勵我。我認為這些方法既有效又適當，因為這讓我感到受重視，並鼓勵我繼續保持好表現，同時又不會因為給太多錢而寵壞我。\n\n如果有一天我為人父母，我很可能會使用類似的獎勵方式。不過，我也會加入更多非物質的獎勵，例如花更多優質的時間陪伴他們，或是在言語上讚美他們。我相信在建立孩子的自信心方面，情感上的支持與物質上的禮物一樣重要。"
            },
            {
                id: 2,
                title: "模擬題 II",
                type: "書信寫作",
                instruction: "請依以下提示寫一封英文 email，長度約 120 字（8 至 12 個句子）。此信可以是一個完整的段落，也可以分段。（評分重點包括內容、組織、文法、用字遣詞、標點符號、大小寫。）<br><br><span class='text-sm text-gray-500'>Email 的上下款不須寫在答案紙上。</span>",
                prompt: "你住在美國的筆友 Ted 最近剛轉學，正在煩惱新學校的交友問題。請寫一封英文 email 給他，信的內容必須包括以下兩點：<br><br>(1) 分享你適應新環境的經驗。<br>(2) 建議他幾個交新朋友的方法。",
                sample: "Dear Ted,\n\nI was sorry to hear that you are struggling to make new friends at your new school. Don't worry too much; it is completely normal to feel anxious in an unfamiliar place. When I first entered high school, I also felt lonely because I didn't know anyone. However, things got better after a few weeks once I started stepping out of my comfort zone.\n\nTo make new friends, I suggest you join some school clubs that match your interests. It is the easiest way to meet people who share the same hobbies. Furthermore, try to smile more and simply say hi to your classmates. A friendly attitude can make a huge difference. I am sure you will make great friends soon!\n\nBest wishes,\n[Your Name]",
                translation: "親愛的 Ted：\n\n聽到你在新學校交友遇到困難，我感到很遺憾。不要太擔心；在陌生的地方感到焦慮是完全正常的。當我剛進高中時，我也因為不認識任何人而感到孤單。然而，幾週後當我開始走出舒適圈，情況就改善了。\n\n為了結交新朋友，我建議你參加一些符合你興趣的學校社團。這是認識有相同嗜好的人最簡單的方法。此外，試著多微笑並簡單地向同學打招呼。友善的態度會帶來很大的改變。我相信你很快就會交到好朋友的！\n\n祝好，\n[你的名字]"
            },
            {
                id: 3,
                title: "模擬題 III",
                type: "一般寫作",
                instruction: "請依下面所提供的文字提示寫一篇英文作文，長度約 120 字（8 至 12 個句子）。作文可以是一個完整的段落，也可以分段。（評分重點包括內容、組織、文法、用字遣詞、標點符號、大小寫。）",
                prompt: "現代人經常熬夜，這似乎已成為一種普遍的現象。請寫一篇文章說明：<br><br>(1) 你或你身邊的人通常為了什麼原因熬夜？<br>(2) 熬夜對生活或健康帶來了哪些負面影響？請提出一個改善這個壞習慣的建議。",
                sample: "Nowadays, staying up late has become a common habit. Many people I know, including myself, usually stay up late to finish school assignments or play video games. Sometimes, we just lose track of time while scrolling through social media.\n\nHowever, this bad habit brings several negative effects. The most obvious one is feeling exhausted the next day, which makes it hard to concentrate in class. Furthermore, a lack of sleep can weaken our immune system and make us sick easily. To improve this situation, I suggest setting a strict bedtime routine. For example, turning off all electronic devices an hour before bed can help us fall asleep faster and get enough rest.",
                translation: "現今，熬夜已經成為一種普遍的習慣。我認識的很多人（包括我自己）通常會為了完成學校作業或玩電動而熬夜。有時候，我們只是在滑社群媒體時忘了時間。\n\n然而，這個壞習慣帶來了一些負面影響。最明顯的就是隔天會感到疲憊，這使得上課很難專心。此外，睡眠不足會削弱我們的免疫系統，使我們容易生病。為了改善這種情況，我建議設定嚴格的就寢時間。例如，在睡前一小時關閉所有電子設備，可以幫助我們更快入睡並獲得足夠的休息。"
            },
            {
                id: 4,
                title: "模擬題 IV",
                type: "一般寫作",
                instruction: "請依下面所提供的文字提示寫一篇英文作文，長度約 120 字（8 至 12 個句子）。作文可以是一個完整的段落，也可以分段。（評分重點包括內容、組織、文法、用字遣詞、標點符號、大小寫。）",
                prompt: "智慧型手機已經是生活中不可或缺的物品。請寫一篇文章分享：<br><br>(1) 你一天通常花多少時間在手機上？主要都在做什麼？<br>(2) 如果規定你一整天都不能使用手機，你覺得你的生活會有什麼改變？",
                sample: "Smartphones have become an essential part of our daily lives. On average, I spend about three hours a day on my phone. I mostly use it to chat with friends, watch funny videos, and search for information for my homework. It is definitely a very convenient tool.\n\nIf I were forbidden to use my smartphone for a whole day, I think my life would change significantly. At first, I might feel a bit anxious and bored because I couldn't check my messages instantly. However, I would also have more free time to do other meaningful things, such as reading a novel, taking a walk, or having a real face-to-face conversation with my family.",
                translation: "智慧型手機已經成為我們日常生活中不可或缺的一部分。平均而言，我每天花大約三個小時在手機上。我主要用它來和朋友聊天、看搞笑影片，以及為我的作業尋找資料。它絕對是一個非常方便的工具。\n\n如果我被禁止整天使用智慧型手機，我想我的生活會發生很大的改變。起初，我可能會感到有點焦慮和無聊，因為我無法立即查看訊息。然而，我也會有更多空閒時間去做其他有意義的事情，例如讀一本小說、散步，或與家人進行真正的面對面交談。"
            },
            {
                id: 5,
                title: "模擬題 V",
                type: "書信寫作",
                instruction: "請依以下提示寫一封英文 email，長度約 120 字（8 至 12 個句子）。此信可以是一個完整的段落，也可以分段。（評分重點包括內容、組織、文法、用字遣詞、標點符號、大小寫。）<br><br><span class='text-sm text-gray-500'>Email 的上下款不須寫在答案紙上。</span>",
                prompt: "你的外國朋友 Sarah 計畫下個月來台灣旅遊。請寫一封英文 email 給她，包含：<br><br>(1) 推薦一個你最喜歡的台灣城市或景點，並說明原因。<br>(2) 提醒她來台灣旅遊時需要注意的一件事（例如天氣、交通或飲食習慣）。",
                sample: "Dear Sarah,\n\nI am so excited to hear that you are visiting Taiwan next month! I highly recommend that you visit Tainan. It is a beautiful city in southern Taiwan, famous for its historical buildings and delicious local food. You can try beef soup and bubble tea there, which are absolutely amazing. I am sure you will love the traditional atmosphere.\n\nHowever, there is one thing you should pay attention to. The weather in Taiwan can be quite hot and humid, especially in the south. Please remember to bring light clothes, a hat, and an umbrella to protect yourself from the strong sunshine or sudden afternoon rain. I can't wait to see you!\n\nBest wishes,\n[Your Name]",
                translation: "親愛的 Sarah：\n\n聽到你下個月要來台灣旅遊，我真的太興奮了！我強烈推薦你去台南。那是台灣南部一座美麗的城市，以其歷史建築和美味的當地食物而聞名。你可以在那裡品嚐牛肉湯和珍珠奶茶，絕對非常棒。我相信你會喜歡那裡傳統的氛圍。\n\n然而，有一件事你應該注意。台灣的天氣可能會非常炎熱潮濕，尤其是在南部。請記得帶輕便的衣服、帽子和雨傘，以保護自己免受強烈陽光或午後陣雨的影響。我等不及要見到你了！\n\n祝好，\n[你的名字]"
            }
        ];

        let currentIndex = 0;
        let isSampleVisible = false;
        let currentAudio = null;
        let isAudioPlaying = false;

        // DOM Elements
        const questionListEl = document.getElementById('question-list');
        const titleEl = document.getElementById('question-title');
        const badgeEl = document.getElementById('question-type-badge');
        const instructionEl = document.getElementById('question-instruction');
        const promptEl = document.getElementById('question-prompt');
        const essayInputEl = document.getElementById('user-essay');
        const wordCountEl = document.getElementById('word-count');
        const sampleAreaEl = document.getElementById('sample-area');
        const sampleTextEl = document.getElementById('sample-text');
        const sampleTranslationEl = document.getElementById('sample-translation');
        const sampleWordCountEl = document.getElementById('sample-word-count');
        const toggleBtnEl = document.getElementById('toggle-sample-btn');
        const playTtsBtnEl = document.getElementById('play-tts-btn');
        const ttsIconEl = document.getElementById('tts-icon');
        const ttsTextEl = document.getElementById('tts-text');
        const feedbackAreaEl = document.getElementById('feedback-area');
        const feedbackLoadingEl = document.getElementById('feedback-loading');
        const feedbackContentEl = document.getElementById('feedback-content');
        const submitBtnEl = document.getElementById('submit-btn');

        // Initialize App
        function init() {
            renderQuestionList();
            loadQuestion(0);

            // Word count listener
            essayInputEl.addEventListener('input', updateWordCount);
        }

        // Render Sidebar
        function renderQuestionList() {
            questionListEl.innerHTML = '';
            questions.forEach((q, index) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-lg border font-medium transition-colors ${
                    index === currentIndex 
                    ? 'bg-warm-100 border-warm-400 text-warm-800 shadow-sm' 
                    : 'bg-white border-transparent text-gray-600 hover:bg-warm-50 hover:border-warm-200'
                }`;
                btn.innerHTML = `<span class="inline-block w-6 text-warm-500">${index + 1}.</span> ${q.title} <span class="text-xs text-gray-400 block ml-6">${q.type}</span>`;
                btn.onclick = () => loadQuestion(index);
                questionListEl.appendChild(btn);
            });
        }

        // Load Question Content
        function loadQuestion(index) {
            currentIndex = index;
            const q = questions[index];
            
            titleEl.textContent = q.title;
            badgeEl.textContent = q.type;
            instructionEl.innerHTML = q.instruction;
            promptEl.innerHTML = q.prompt;
            sampleTextEl.textContent = q.sample;
            sampleTranslationEl.textContent = q.translation;
            sampleWordCountEl.textContent = countWords(q.sample);
            
            // Reset UI states
            essayInputEl.value = '';
            updateWordCount();
            stopAudio();
            closeSample();
            closeFeedback();
            renderQuestionList(); // Update active state in sidebar
        }

        // Word Count Logic
        function countWords(text) {
            const trimmed = text.trim();
            if (trimmed === '') return 0;
            // Basic English word split
            return trimmed.split(/\s+/).length;
        }

        function updateWordCount() {
            const count = countWords(essayInputEl.value);
            wordCountEl.textContent = count;
            if (count < 80) {
                wordCountEl.className = 'text-red-500 font-bold';
            } else if (count > 150) {
                wordCountEl.className = 'text-orange-500 font-bold';
            } else {
                wordCountEl.className = 'text-green-600 font-bold';
            }
        }

        // Toggle Sample Essay
        function toggleSample() {
            isSampleVisible = !isSampleVisible;
            if (isSampleVisible) {
                sampleAreaEl.classList.remove('hidden');
                toggleBtnEl.innerHTML = '<i class="fas fa-eye-slash"></i> <span>隱藏範例文章</span>';
                toggleBtnEl.classList.replace('bg-warm-100', 'bg-warm-200');
            } else {
                closeSample();
            }
        }

        function closeSample() {
            isSampleVisible = false;
            sampleAreaEl.classList.add('hidden');
            toggleBtnEl.innerHTML = '<i class="fas fa-eye"></i> <span>顯示範例文章</span>';
            toggleBtnEl.classList.replace('bg-warm-200', 'bg-warm-100');
            stopAudio();
        }

        function closeFeedback() {
            feedbackAreaEl.classList.add('hidden');
        }

        // AI API Call with Exponential Backoff
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (e) {
                    if (i === maxRetries - 1) throw e;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        // Submit for Evaluation
        async function submitForEvaluation() {
            const text = essayInputEl.value.trim();
            if (text.length < 20) {
                alert('請至少輸入一段完整的英文句子後再提交批改。');
                return;
            }

            // UI Update
            submitBtnEl.disabled = true;
            submitBtnEl.classList.add('opacity-70', 'cursor-not-allowed');
            feedbackAreaEl.classList.remove('hidden');
            feedbackLoadingEl.classList.remove('hidden');
            feedbackLoadingEl.classList.add('flex');
            feedbackContentEl.classList.add('hidden');
            feedbackContentEl.innerHTML = '';

            // Scroll to feedback
            feedbackAreaEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

            const q = questions[currentIndex];
            const systemPrompt = `你是一個專業的台灣 GEPT 全民英檢中級寫作批改老師。
請根據以下題目與使用者寫作的內容進行評分與批改。
評分重點包括：內容(是否切題)、組織(連貫性)、文法、用字遣詞、標點符號與大小寫。

請務必使用 HTML 格式回覆 (只使用基本的 <div>, <p>, <strong>, <ul>, <li>, <br>, <span> 等標籤進行排版，不要有 markdown 符號或 \`\`\`html 標籤)。
建議的結構如下：
1. <h4 style="color:#d97706; font-size:1.25rem; font-weight:bold; margin-bottom:0.5rem;">預估級分</h4>：給出 0-5 級分，並簡述原因。
2. <h4 style="color:#d97706; font-size:1.25rem; font-weight:bold; margin-bottom:0.5rem; margin-top:1rem;">優點</h4>：列出文章寫得好的地方。
3. <h4 style="color:#d97706; font-size:1.25rem; font-weight:bold; margin-bottom:0.5rem; margin-top:1rem;">需改進與文法錯誤</h4>：具體指出文法錯誤或句子不順的地方。
4. <h4 style="color:#d97706; font-size:1.25rem; font-weight:bold; margin-bottom:0.5rem; margin-top:1rem;">修改建議版本</h4>：提供一段修改過後，語句順暢且符合中級程度的版本。

請全程使用繁體中文回覆。`;

            const userQuery = `題目類型：${q.type}
題目提示：${q.prompt.replace(/<br>/g, '')}
學生作答內容：
${text}`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                let feedbackHtml = result.candidates?.[0]?.content?.parts?.[0]?.text;
                
                // Clean up possible markdown artifacts if model ignored instruction
                feedbackHtml = feedbackHtml.replace(/```html/g, '').replace(/```/g, '');

                feedbackLoadingEl.classList.add('hidden');
                feedbackLoadingEl.classList.remove('flex');
                feedbackContentEl.classList.remove('hidden');
                feedbackContentEl.innerHTML = feedbackHtml;

            } catch (error) {
                console.error("Evaluation Error:", error);
                feedbackLoadingEl.classList.add('hidden');
                feedbackLoadingEl.classList.remove('flex');
                feedbackContentEl.classList.remove('hidden');
                feedbackContentEl.innerHTML = `
                    <div class="bg-red-50 text-red-700 p-4 rounded-lg border border-red-200">
                        <p class="font-bold"><i class="fas fa-exclamation-triangle mr-2"></i>連線或批改發生錯誤</p>
                        <p class="text-sm mt-1">目前無法連接到批改伺服器，請稍後再試。如果您在預覽環境，請確認 API 金鑰已由環境提供。</p>
                    </div>`;
            } finally {
                submitBtnEl.disabled = false;
                submitBtnEl.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        // --- Text to Speech Functions ---

        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                isAudioPlaying = false;
                ttsIconEl.className = 'fas fa-volume-up';
                ttsTextEl.textContent = '真人語音朗讀';
                playTtsBtnEl.disabled = false;
            }
        }

        async function toggleSampleAudio() {
            if (isAudioPlaying) {
                stopAudio();
                return;
            }

            const text = questions[currentIndex].sample;
            if (!text) return;

            // UI Update: Loading
            ttsIconEl.className = 'fas fa-spinner fa-spin';
            ttsTextEl.textContent = '語音生成中...';
            playTtsBtnEl.disabled = true;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: "Aoede" } // Aoede is a natural-sounding female voice profile
                        }
                    }
                }
            };

            try {
                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const inlineData = response.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                
                if (inlineData) {
                    const base64Data = inlineData.data;
                    const mimeType = inlineData.mimeType;
                    
                    // Extract sample rate from mimeType (e.g., audio/L16;rate=24000)
                    const match = mimeType.match(/rate=(\d+)/);
                    const sampleRate = match ? parseInt(match[1]) : 24000;
                    
                    // Decode Base64 to PCM
                    const binaryString = window.atob(base64Data);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    const pcmData = new Int16Array(bytes.buffer);
                    
                    // Convert PCM to WAV
                    const wavBlob = pcmToWav(pcmData, sampleRate);
                    const audioUrl = URL.createObjectURL(wavBlob);
                    
                    // Setup new Audio
                    currentAudio = new Audio(audioUrl);
                    
                    currentAudio.onended = () => {
                        isAudioPlaying = false;
                        ttsIconEl.className = 'fas fa-volume-up';
                        ttsTextEl.textContent = '真人語音朗讀';
                        playTtsBtnEl.disabled = false;
                    };

                    currentAudio.play();
                    isAudioPlaying = true;
                    
                    // UI Update: Playing
                    ttsIconEl.className = 'fas fa-stop-circle';
                    ttsTextEl.textContent = '停止朗讀';
                    playTtsBtnEl.disabled = false;
                } else {
                    throw new Error("No audio data returned");
                }
            } catch (error) {
                console.error("TTS Error:", error);
                alert("語音生成失敗，請檢查網路狀態或稍後再試。");
                ttsIconEl.className = 'fas fa-volume-up';
                ttsTextEl.textContent = '真人語音朗讀';
                playTtsBtnEl.disabled = false;
            }
        }

        // Helper: Convert raw PCM16 to WAV format for browser playback
        function pcmToWav(pcmData, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);

            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            // WAV Header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // Format = PCM
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmData.length * 2, true);

            // Write PCM samples
            let offset = 44;
            for (let i = 0; i < pcmData.length; i++) {
                view.setInt16(offset, pcmData[i], true);
                offset += 2;
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        // Run Init
        window.onload = init;
    </script>
